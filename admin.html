<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloria 排班管理</title>
<style>
:root{
  --A:#2E7D32;--A-bg:#E8F5E9;--M:#E65100;--M-bg:#FFF3E0;
  --P:#1565C0;--P-bg:#E3F2FD;--RL:#757575;--RL-bg:#F5F5F5;
  --AL:#6A1B9A;--AL-bg:#F3E5F5;--SL:#C62828;--SL-bg:#FFEBEE;
  --OL:#37474F;--OL-bg:#ECEFF1;--SP:#AD1457;--SP-bg:#FCE4EC;
  --swap:#E65100;
  --accent:#000000;
  --gold:#C9A96E;--gold-d:#8B6914;--gold-bg:#FBF5E8;
  --cream:#F7F4EF;--warm-border:#E2D8CC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--cream);min-height:100vh;font-size:14px}

/* ── Header ── */
header{background:#000;color:#fff;padding:0 20px;display:flex;align-items:center;height:54px;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.5);position:sticky;top:0;z-index:100}
header h1{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap}
header h1 span{color:var(--gold)}
.htabs{display:flex;gap:1px}
.htabs button{background:none;border:none;color:rgba(255,255,255,.5);padding:6px 14px;cursor:pointer;font-size:12px;letter-spacing:.8px;text-transform:uppercase;transition:.15s;border-bottom:2px solid transparent}
.htabs button.active{color:var(--gold);border-bottom-color:var(--gold)}
.htabs button:hover:not(.active){color:rgba(255,255,255,.85)}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.5px;transition:.15s;white-space:nowrap;text-transform:uppercase}
.btn:disabled{opacity:.35;cursor:not-allowed}
.bg{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}.bg:hover:not(:disabled){background:rgba(255,255,255,.2)}
.bp{background:var(--gold);color:#000}.bp:hover:not(:disabled){background:#B8962E}
.bw{background:#fff;color:#000;border:1px solid #000}.bw:hover:not(:disabled){background:#F0F0F0}
.br{background:#C62828;color:#fff}.br:hover:not(:disabled){background:#B71C1C}
.bd{background:#F0EBE3;color:#333;border:1px solid var(--warm-border)}.bd:hover:not(:disabled){background:#E8E0D5}

/* ── Month bar ── */
#lockBanner{display:none;background:#B71C1C;color:#fff;padding:7px 20px;font-size:13px;font-weight:600;text-align:center}
.mbar{background:#fff;border-bottom:1px solid #E0E0E0;padding:9px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mbar select{border:1px solid #CCC;padding:5px 10px;border-radius:7px;font-size:14px;font-weight:700;color:var(--accent)}
.mbar .sep{width:1px;height:24px;background:#DDD}

/* ── Pages ── */
.page{display:none;min-height:calc(100vh - 52px)}
.page.active{display:block}

/* ── Setup Wizard ── */
.wizard{max-width:700px;margin:32px auto;padding:0 16px}
.wcard{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.1);overflow:hidden;margin-bottom:20px}
.wcard-head{padding:16px 20px;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;gap:10px}
.wcard-head h2{font-size:16px;font-weight:700}
.wcard-head .step{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.wcard-body{padding:16px 20px}
/* Staff list in wizard */
.srow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #F5F5F5}
.srow:last-child{border-bottom:none}
.sname{flex:1;font-weight:600}
.stag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.stag.FT{background:#E3F2FD;color:#1976D2}.stag.PT{background:#FFF3E0;color:#E65100}
.add-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #F0F0F0;flex-wrap:wrap}
.add-row input{flex:1;min-width:120px;padding:7px 10px;border:1px solid #DDD;border-radius:7px;font-size:13px}
.add-row input:focus{outline:none;border-color:#1976D2}
.add-row select{padding:7px 10px;border:1px solid #DDD;border-radius:7px;font-size:13px}
.wbig{width:100%;padding:14px;font-size:16px;border-radius:10px;border:none;background:var(--gold);color:#000;font-weight:700;cursor:pointer;transition:.15s;margin-top:4px;letter-spacing:.8px;text-transform:uppercase}
.wbig:hover{background:#B8962E}
.wbig.auto{background:var(--accent);color:#fff}.wbig.auto:hover{background:#222}

/* ── Schedule editor ── */
.editor-wrap{display:flex;height:calc(100vh - 100px);overflow:hidden}
.editor-toolbar{background:#fff;border-bottom:1px solid #EEE;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.grid-scroll{flex:1;overflow:auto;padding:12px}
.sidebar{width:310px;border-left:1px solid #E0E0E0;background:#fff;overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}
.sb-sec{border-bottom:1px solid #F0F0F0}
.sb-head{padding:10px 14px;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;background:var(--cream);letter-spacing:.5px;text-transform:uppercase}
.sb-head:hover{background:#EDE8E1}
.sb-body{padding:10px 14px}

/* ── Grid ── */
table.sg{border-collapse:collapse;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);min-width:900px}
table.sg th{background:var(--accent);color:#fff;padding:6px 2px;font-size:11px;text-align:center;position:sticky;top:0;z-index:2;white-space:nowrap}
table.sg th.sn{position:sticky;left:0;z-index:3;min-width:78px}
table.sg td{border:1px solid #EBEBEB;padding:0;text-align:center}
table.sg td.sn{position:sticky;left:0;z-index:1;background:#FAFAFA;font-weight:600;font-size:13px;padding:0 8px;border-right:2px solid #DDD;white-space:nowrap;min-width:78px}
.dh-d{font-size:12px;font-weight:700}.dh-w{font-size:9px;opacity:.65}
th.wknd{background:#FFCDD2}th.fri{background:var(--gold-d)}
th.wknd,th.fri{border-bottom:2px solid #EF9A9A}
th.wknd .dh-d,th.wknd .dh-w{color:#C62828}
td.wbg{background:transparent}
th.hol{background:#FFCDD2 !important;cursor:pointer;border-bottom:2px solid #EF9A9A !important}
th.hol:hover{background:#EF9A9A !important}
th.hol .dh-d,th.hol .dh-w{color:#C62828}
td.hol-bg{background:transparent !important}
/* Past date styling */
td.past-day .cell{color:#CACACA !important;cursor:default !important;pointer-events:none}
td.past-day .cell.empty{color:#E0E0E0 !important}
/* Print header (hidden on screen) */
.print-header{display:none;padding:0 0 8px 0;border-bottom:2px solid #CCC;margin-bottom:10px}
@media print{
  @page{size:A4 landscape;margin:8mm}
  header,.wiz-bar,.editor-toolbar,.sidebar,#evtPop,#picker,#lockBanner,.result-sidebar,.result-toolbar,.wiz-steps-ind,.htabs,.hright{display:none !important}
  .cell{outline:none !important;box-shadow:none !important}
  .cell::before,.cell::after{display:none !important}
  .swap-dot{display:none !important}
  .cell.RL,.cell.AL,.cell.SL,.cell.ML,.cell.BL,.cell.OL,.cell.PL,.cell.FL,.cell.WL,.cell.生理假,
  .cell.do-locked,.cell.do-mark{background:#E8E8E8 !important;color:#888 !important;border-color:#CCC !important}
  .page{display:none !important}
  .page.active{display:block !important}
  #wiz-s1{display:none !important}
  #wiz-s3{display:block !important;height:auto !important}
  #page-result>div{display:block !important;height:auto !important}
  .result-main{display:block !important;height:auto !important;overflow:visible !important}
  .result-grid-scroll{overflow:visible !important;padding:4px !important;flex:none !important}
  #wiz-s3>div{display:block !important;height:auto !important;overflow:visible !important}
  .grid-scroll{overflow:visible !important;padding:4px !important}
  table.sg{font-size:7.5px !important;width:100% !important}
  table.sg th,table.sg td{padding:1px !important}
  .cell{height:20px !important;min-width:22px !important;font-size:7.5px !important}
  .dh-d{font-size:8px !important}.dh-w{font-size:6px !important}
  table.sg td.sn{min-width:52px !important;font-size:9px !important}
  .print-header{display:block !important}
}
/* History sidebar */
.sb-hist-item{padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid #F5F5F5;transition:background .15s;color:#333}
.sb-hist-item:hover{background:#F0ECF8}
.sb-hist-item.active{background:#EDE0FA;font-weight:700;color:#6A1B9A}
.sb-hist-lk{font-size:9px;background:#6A1B9A;color:#fff;border-radius:3px;padding:1px 5px;margin-left:auto;white-space:nowrap}
.cell{height:32px;width:32px;min-width:32px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;cursor:pointer;position:relative;user-select:none;transition:opacity .1s}
.cell:hover{opacity:.75}
.cell.A{background:var(--A-bg);color:var(--A)}.cell.M{background:var(--M-bg);color:var(--M)}
.cell.P{background:var(--P-bg);color:var(--P)}.cell.RL,.cell.RL-{background:var(--RL-bg);color:var(--RL)}
.cell.AL{background:var(--AL-bg);color:var(--AL)}.cell.SL{background:var(--SL-bg);color:var(--SL)}
.cell.OL{background:var(--OL-bg);color:var(--OL)}.cell.生理假{background:var(--SP-bg);color:var(--SP)}
.cell.empty{color:#CCC}
.cell.locked::after{content:'🔒';position:absolute;top:0;right:1px;font-size:7px}
.cell.fixed-off{background:#FFF8E1 !important;color:#E65100 !important;cursor:default}
.cell.fixed-off::after{content:'📌';position:absolute;top:0;right:1px;font-size:7px}
.cell.do-mark{box-shadow:inset 0 0 0 1.5px #E91E63;border-radius:3px}
.cell.vio{outline:1px solid #F44336;outline-offset:-1px;border-radius:2px}
.cell.vio::before{content:'✕';position:absolute;top:0;right:1px;font-size:7px;color:#F44336;line-height:1;font-weight:900}
.cell.swap-req{outline:2px dashed var(--swap);outline-offset:-2px;border-radius:2px}
.cell.swap-req::before{content:'申';position:absolute;top:0;left:1px;font-size:7px;background:var(--swap);color:#fff;border-radius:2px;padding:0 2px;font-weight:700}
.cell.drag-over{outline:2px dashed #1976D2;outline-offset:-2px}
tr.stat td{height:18px;font-size:10px;background:#F9F9F9;text-align:center}
tr.stat td.warn{background:#FFEBEE;color:#C62828;font-weight:700}
tr.stat td.exact{background:#E8F5E9;color:#2E7D32;font-weight:700}
tr.stat td.surplus{background:#FFF8E1;color:#F57F17;font-weight:700}
.need-n{font-size:8px;opacity:.55;font-weight:400}

/* ── Event rows ── */
tr.evt td{height:22px;border-bottom:1px solid #F0F0F0}
.evt-cell{height:22px;min-width:32px;width:32px;padding:0 2px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;border-radius:3px;color:#BBB}
.evt-cell:hover{background:rgba(0,0,0,.06)}
.evt-cell.v{color:#fff}
tr.evt-audit  .evt-cell.v{background:#7B1FA2}
tr.evt-meeting .evt-cell.v{background:#1565C0}
tr.evt-training .evt-cell.v{background:#2E7D32}
tr.evt .sn-evt{font-size:9px;font-weight:700;padding:0 6px;white-space:nowrap;letter-spacing:.3px}
tr.evt-audit   .sn-evt{color:#7B1FA2}
tr.evt-meeting  .sn-evt{color:#1565C0}
tr.evt-training .sn-evt{color:#2E7D32}
/* Event text popup */
#evtPop{display:none;position:fixed;z-index:501;background:#fff;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.22);padding:12px;min-width:210px}
#evtPop.show{display:block}
#evtPopTitle{font-weight:700;font-size:13px;margin-bottom:8px;color:#333}
#evtInput{width:100%;padding:6px 9px;border:1.5px solid #DDD;border-radius:6px;font-size:13px;outline:none}
#evtInput:focus{border-color:var(--gold)}
.evtPopFoot{display:flex;gap:6px;margin-top:8px}
.evtPopFoot button{flex:1;padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}

/* ── Picker popup ── */
#picker{display:none;position:fixed;z-index:500;background:#fff;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.2);padding:12px;min-width:260px}
#picker.show{display:block}
.pk-title{font-weight:700;font-size:13px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid #EEE;color:#333}
.pk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.po{padding:9px 4px;border-radius:7px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:.1s}
.po:hover{filter:brightness(.9)}
.po.A{background:var(--A-bg);color:var(--A)}.po.M{background:var(--M-bg);color:var(--M)}
.po.P{background:var(--P-bg);color:var(--P)}.po.RL{background:var(--RL-bg);color:var(--RL)}
.po.AL{background:var(--AL-bg);color:var(--AL)}.po.SL{background:var(--SL-bg);color:var(--SL)}
.po.OL{background:var(--OL-bg);color:var(--OL)}.po.生理假{background:var(--SP-bg);color:var(--SP)}
.po.clear{background:#FFF3E0;color:#E65100}
.pk-foot{display:flex;gap:6px}
.pk-foot button{flex:1;padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}

/* Violations */
.vio-item{border-radius:7px;border:1px solid #EEE;margin-bottom:7px;overflow:hidden}
.vio-main{display:flex;align-items:flex-start;gap:7px;padding:7px 9px}
.vbadge{flex-shrink:0;padding:2px 6px;border-radius:9px;font-size:10px;font-weight:700}
.vbadge.error{background:#FFEBEE;color:#C62828}.vbadge.warn{background:#FFF3E0;color:#E65100}
.vmsg{flex:1;font-size:12px;line-height:1.45;color:#333}
.vbtn{flex-shrink:0;background:var(--gold-bg);color:var(--gold-d);border:1px solid var(--warm-border);padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;white-space:nowrap}
.vbtn:hover{background:#F0E6C8}
.sug-box{background:var(--gold-bg);border-top:1px solid var(--warm-border);padding:9px 11px;font-size:12px}
.sug-box b{color:var(--gold-d)}.sug-act{display:flex;gap:6px;margin-top:7px}
.sug-act button{padding:4px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.sa-ok{background:var(--gold);color:#000}.sa-ok:hover{background:#B8962E}
.sa-no{background:#EEE;color:#555}.sa-no:hover{background:#DDD}

/* Swap panel */
.swap-item{border-radius:6px;border:1px solid #FFE0B2;background:#FFF8E1;padding:8px 10px;margin-bottom:7px;font-size:12px}
.swbadge{background:var(--swap);color:#fff;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin-right:5px}
.sw-act{display:flex;gap:5px;margin-top:6px}
.sw-act button{padding:3px 10px;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600}
.sw-ok{background:var(--gold);color:#000}.sw-no{background:#EEE;color:#555}

/* Staff (settings) page */
.spage{max-width:640px;margin:24px auto;padding:0 16px}

/* ── Wizard step bar ── */
.wiz-bar{background:#fff;border-bottom:1px solid #EEE;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.wiz-month{font-weight:700;font-size:15px;color:#333;white-space:nowrap}
.wiz-steps-ind{display:flex;align-items:center;gap:6px}
.ws{padding:4px 14px;border-radius:14px;font-size:12px;font-weight:600;color:#AAA;background:#F0F0F0;transition:.2s;white-space:nowrap}
.ws.ws-active{background:var(--accent);color:#fff}
.ws-arr{color:#CCC;font-size:11px}
/* ── Result page ── */
.result-sidebar{width:150px;border-right:1px solid #E0E0E0;background:#fff;flex-shrink:0;overflow-y:auto}
.result-sb-head{padding:10px 14px;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;background:var(--cream);border-bottom:1px solid #EEE}
.rm-item{padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #F5F5F5;color:#333;transition:background .15s;font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rm-item:hover{background:#F5F5F5}
.rm-item.active{background:#EDE0FA;color:#6A1B9A;font-weight:700}
.rm-lk{font-size:9px;background:#6A1B9A;color:#fff;border-radius:3px;padding:1px 4px;white-space:nowrap}
.rm-nl{font-size:9px;background:#E0E0E0;color:#666;border-radius:3px;padding:1px 4px;white-space:nowrap}
.result-main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.result-toolbar{padding:10px 16px;border-bottom:1px solid #EEE;display:flex;align-items:center;gap:10px;flex-shrink:0;background:#fff}
.result-grid-scroll{flex:1;overflow:auto;padding:12px}
/* DO locked cell (step 3) */
.cell.do-locked{background:#FCE4EC !important;color:#AD1457 !important;cursor:not-allowed !important;box-shadow:inset 0 0 0 1.5px #E91E63;border-radius:3px}
.cell.do-locked::after{content:'📅';position:absolute;top:0;right:1px;font-size:7px}
/* Step 2 DO list */
.do-list-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F5F5F5}
.do-list-row:last-child{border-bottom:none}

/* Notif */
#notif{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.ni{background:#323232;color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;box-shadow:0 3px 12px rgba(0,0,0,.25);animation:sli .2s ease;pointer-events:auto}
.ni.ok{background:#2E7D32}.ni.err{background:#B71C1C}
@keyframes sli{from{transform:translateX(50px);opacity:0}to{transform:none;opacity:1}}

/* modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;align-items:center;justify-content:center}
.mbg.show{display:flex}
.mc{background:#fff;border-radius:12px;padding:24px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.mc h3{font-size:16px;font-weight:700;margin-bottom:16px}
.mf{margin-bottom:12px}.mf label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.mf input,.mf select{width:100%;padding:8px 11px;border:1px solid #DDD;border-radius:7px;font-size:13px}
.mf input:focus{outline:none;border-color:#1976D2}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── Designated Off Calendar ── */
.do-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:600;align-items:center;justify-content:center}
.do-bg.show{display:flex}
.do-mc{background:#fff;border-radius:14px;padding:20px;width:340px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.do-mc h3{font-size:15px;font-weight:700;margin-bottom:3px;letter-spacing:.3px}
.do-sub{font-size:11px;color:#999;margin-bottom:14px}
.do-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.do-dow span{text-align:center;font-size:10px;font-weight:600;color:#ABABAB;padding:2px 0}
.do-dow span.we{color:#EF9A9A}
.do-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.do-day{border-radius:6px;padding:7px 2px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;background:#F5F5F5;color:#333;transition:.1s;user-select:none}
.do-day:hover{background:#E0E0E0}
.do-day.we{color:#EF5350}
.do-day.sel{background:#FFCDD2;color:#C62828;outline:2px solid #EF9A9A;outline-offset:-1px}
.do-day.empty{visibility:hidden;cursor:default}
.do-day.hol{outline:2px solid #9C27B0;outline-offset:-2px;color:#6A1B9A}
.do-day.hol.we{color:#6A1B9A}
.do-day.hol.sel{background:#CE93D8;color:#4A148C;outline-color:#6A1B9A}
.do-foot{display:flex;gap:8px;margin-top:14px;align-items:center}
.do-cnt{flex:1;font-size:12px;color:#888}
</style>
</head>
<body>

<header>
  <h1>GLORIA <span>MK</span></h1>
  <div class="htabs">
    <button class="active" onclick="showPage('result')">📋 班表</button>
    <button onclick="showPage('schedule')">🗓 排班</button>
  </div>
  <div class="hright">

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const ST={
  months:[], currentMonth:null,
  staff:[], monthStaff:[],
  rules:{},
  daysOfWeek:[], days:[],
  holidays:[],     // 0-based day indices that are national holidays
  draft:{},
  locked:{},       // manually locked by manager
  fixedLocked:{},  // fixed day-off per staff – cannot be edited
  designatedOff:{}, // staffId -> Set<dayIdx> (monthly calendar picks)
  events:{audit:[],meeting:[],training:[]},
  swapReqs:[],
  history:[],
  dirty:false,
};
const DOW={Mon:'一',Tue:'二',Wed:'三',Thu:'四',Fri:'五',Sat:'六',Sun:'日'};
const OFF=new Set(['RL','RL/','RL-','AL','SL','ML','BL','OL','PL','FL','WL','生理假']);
const isOff=x=>!x||OFF.has(x)||x.startsWith('RL');
const isWork=x=>!!x&&!isOff(x);

let pkStaff=null,pkDay=null;
let dragS=null,dragD=null;

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
// ── Fallback data (used when fetch fails on file:// protocol) ──
const STAFF_DEFAULT={staff:[
  {id:"Wiggie",name:"Wiggie",type:"FT",role:"ASM",fixedDayOff:"Tue"},
  {id:"LIV",   name:"LIV",  type:"FT",role:"SUP",fixedDayOff:null},
  {id:"Demi",  name:"Demi", type:"FT",role:"SSA",fixedDayOff:null},
  {id:"Kai",   name:"Kai",  type:"FT",role:"SA", fixedDayOff:null},
  {id:"彤彤",  name:"彤彤", type:"FT",role:"SA", fixedDayOff:null},
  {id:"Alvin", name:"Alvin",type:"FT",role:"SA", fixedDayOff:null},
  {id:"Yvette",name:"Yvette",type:"FT",role:"SA",fixedDayOff:null},
  {id:"Vina",  name:"Vina", type:"FT",role:"SA", fixedDayOff:null},
  {id:"婕芸",  name:"婕芸", type:"FT",role:"SA", fixedDayOff:null},
],rules:{daysOffPerMonth:{min:10,max:11},noSimultaneousOff:["Wiggie","LIV","Demi"],maxConsecutiveWorkDays:4,preferConsecutiveWorkDays:3,earlyShiftBalanceTolerance:1,staffingRequirements:{weekday:{A:1,M:0,P:3},friday:{A:1,M:1,P:3},weekend:{A:1,M:1,P:3}}}};

function isPastDate(dayIdx){
  if(!ST.currentMonth) return false;
  const [y,mo]=ST.currentMonth.split('-').map(Number);
  const today=new Date(); today.setHours(0,0,0,0);
  return new Date(y,mo-1,ST.days[dayIdx])<today;
}
function printSchedule(){
  document.querySelectorAll('#printMonthLabel').forEach(el=>el.textContent=(ST.currentMonth||'')+' 班表');
  document.querySelectorAll('#printDateLabel').forEach(el=>el.textContent=new Date().toLocaleDateString('zh-TW'));
  window.print();
}

const TW_HOL_2026={'01-01':'元旦','02-16':'除夕','02-17':'初一','02-18':'初二','02-19':'初三','02-20':'初四','02-28':'和平紀念日','04-03':'兒童節補假','04-04':'兒童節/清明','05-01':'勞動節','06-19':'端午節','09-25':'中秋節','10-10':'國慶日'};
function getAutoHolidays(month){
  const[y,mo]=month.split('-').map(Number);
  const dim=new Date(y,mo,0).getDate();
  const hols=y===2026?TW_HOL_2026:{};
  const result=[];
  for(let d=1;d<=dim;d++){
    const key=`${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(hols[key]) result.push(d-1);
  }
  return result;
}

async function init(){
  try{
    const sd=await fetch('data/staff.json').then(r=>{if(!r.ok)throw new Error();return r.json();});
    ST.staff=sd.staff.map(s=>({...s}));
    ST.rules=sd.rules;
  } catch(e){
    ST.staff=STAFF_DEFAULT.staff.map(s=>({...s}));
    ST.rules=STAFF_DEFAULT.rules;
  }
  try{
    const idx=await fetch('data/months.json').then(r=>{if(!r.ok)throw new Error();return r.json();});
    ST.months=[...idx.months];
  } catch(e){ ST.months=['2026-01','2026-02','2026-03','2026-04']; }
  await loadResultPage();
}

// ═══════════════════════════════════════════════════
//  MONTH
// ═══════════════════════════════════════════════════
function todayMonth(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function calcDOW(y,mo,days){
  const ns=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return Array.from({length:days},(_,i)=>ns[new Date(y,mo-1,i+1).getDay()]);
}
function getDT(dow){ return dow==='Sat'||dow==='Sun'?'weekend':dow==='Fri'?'friday':'weekday'; }

// ═══════════════════════════════════════════════════
//  WIZARD
// ═══════════════════════════════════════════════════
const DOW_KEYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DOW_LBL_W=['週一','週二','週三','週四','週五','週六','週日'];
const ROLES=['SA','SSA','SUP','ASM'];
function fixedOpts(cur){
  return `<option value="">無固定休</option>`+DOW_KEYS.map((d,k)=>`<option value="${d}"${cur===d?' selected':''}>${DOW_LBL_W[k]}固定休</option>`).join('');
}
function roleOpts(cur){
  return ROLES.map(r=>`<option value="${r}"${cur===r?' selected':''}>${r}</option>`).join('');
}
function renderWizStaff(){
  document.getElementById('wizStaffList').innerHTML=ST.monthStaff.map((s,i)=>{
    const cnt=(ST.designatedOff[s.id]||new Set()).size;
    const doLabel=cnt?`📅 <b style="color:#C62828">${cnt}天</b>`:'📅 休假日';
    return `<div class="srow" style="flex-wrap:wrap;gap:6px">
      <span class="sname" style="min-width:60px">${s.name}</span>
      <select onchange="ST.monthStaff[${i}].role=this.value" style="padding:3px 6px;border:1px solid #DDD;border-radius:5px;font-size:11px">${roleOpts(s.role||'SA')}</select>
      <span class="stag ${s.type}" style="cursor:pointer" onclick="wizToggleType(${i})">${s.type}</span>
      <button class="btn bd" onclick="openDoModal('${s.id}')" style="padding:3px 10px;font-size:11px">${doLabel}</button>
      <button class="btn br" onclick="wizRemove(${i})" style="padding:3px 8px;font-size:11px;margin-left:auto">✕</button>
    </div>`;
  }).join('');
}
function wizAddStaff(){
  const name=document.getElementById('wizName').value.trim();
  const type=document.getElementById('wizType').value;
  if(!name){ notify('請輸入姓名','err'); return; }
  if(ST.monthStaff.find(s=>s.name===name)){ notify('姓名重複','err'); return; }
  ST.monthStaff.push({id:name,name,type});
  ST.draft[name]=new Array(ST.days.length).fill(null);
  ST.locked[name]=new Set();
  document.getElementById('wizName').value='';
  renderWizStaff();
}
function wizRemove(i){
  const s=ST.monthStaff[i];
  delete ST.draft[s.id]; delete ST.locked[s.id];
  ST.monthStaff.splice(i,1); renderWizStaff();
}
function wizToggleType(i){
  ST.monthStaff[i].type=ST.monthStaff[i].type==='FT'?'PT':'FT'; renderWizStaff();
}
async function copyPrevStaff(){
  const sorted=[...ST.months].sort();
  const idx=sorted.indexOf(ST.currentMonth);
  if(idx<=0){ notify('沒有上個月的資料','err'); return; }
  ST.months=sorted; // ensure sorted
  const prev=sorted[idx-1];
  try{
    const sc=await fetch(`data/schedule_${prev.replace('-','_')}.json`).then(r=>r.json());
    const prevStaff=(sc.staff||[]).map(id=>ST.staff.find(s=>s.id===id)||{id,name:id,type:'FT'});
    ST.monthStaff=prevStaff.map(s=>({...s}));
    for(const s of ST.monthStaff){ ST.draft[s.id]=new Array(ST.days.length).fill(null); ST.locked[s.id]=new Set(); }
    renderWizStaff(); notify(`已沿用 ${prev} 的員工名單（${prevStaff.length}人）`);
  } catch(e){ notify('無法讀取上月資料','err'); }
}
function wizAutoAndGo(){
  if(!ST.monthStaff.length){ notify('請先確認員工名單','err'); return; }
  autoSchedule();
  showEditor();
}

// ═══════════════════════════════════════════════════
//  DESIGNATED OFF MODAL
// ═══════════════════════════════════════════════════
let _doStaff=null, _doSel=new Set();
function openDoModal(staffId){
  _doStaff=staffId; _doSel=new Set(ST.designatedOff[staffId]||[]);
  const s=ST.monthStaff.find(x=>x.id===staffId);
  document.getElementById('doTitle').textContent=`${s.name} 的指定休假日`;
  renderDoGrid();
  document.getElementById('doModal').classList.add('show');
}
function renderDoGrid(){
  const[y,mo]=ST.currentMonth.split('-').map(Number);
  const firstDow=new Date(y,mo-1,1).getDay(); // 0=Sun
  const n=ST.days.length;
  let h='';
  for(let i=0;i<firstDow;i++) h+='<div class="do-day empty"></div>';
  for(let i=0;i<n;i++){
    const dow=ST.daysOfWeek[i];
    const we=dow==='Sat'||dow==='Sun';
    const isHol=ST.holidays.includes(i);
    const sel=_doSel.has(i);
    const cls=['do-day',we?'we':'',isHol?'hol':'',sel?'sel':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}" onclick="toggleDoDay(${i})">${ST.days[i]}${isHol?'<span style="font-size:7px;display:block;line-height:1">假</span>':''}</div>`;
  }
  document.getElementById('doGrid').innerHTML=h;
  document.getElementById('doCnt').textContent=`已選 ${_doSel.size} 天`;
}
function renderStaffDoList(){
  const el=document.getElementById('staffDoList'); if(!el)return;
  el.innerHTML=ST.monthStaff.map(s=>{
    const cnt=(ST.designatedOff[s.id]||new Set()).size;
    return `<div class="srow">
      <span class="sname">${s.name}</span>
      <button class="btn bd" onclick="openDoModal('${s.id}')" style="padding:3px 10px;font-size:11px">📅 ${cnt?`<b style="color:#C62828">${cnt}天</b>`:'選日期'}</button>
    </div>`;
  }).join('');
}
function openStaffDoModal(){ renderStaffDoList(); document.getElementById('staffDoModal').classList.add('show'); }
function toggleDoDay(idx){ if(_doSel.has(idx))_doSel.delete(idx);else _doSel.add(idx); renderDoGrid(); }
function saveDesignatedOff(){ ST.designatedOff[_doStaff]=new Set(_doSel); closeDoModal(); renderWizStaff(); renderWizDOStep(); notify('已儲存指定休假日'); }
function closeDoModal(){ document.getElementById('doModal').classList.remove('show'); _doStaff=null; }

// ═══════════════════════════════════════════════════
//  HISTORY / UNDO
// ═══════════════════════════════════════════════════
function pushHistory(){
  const snap={draft:JSON.parse(JSON.stringify(ST.draft)),locked:{}};
  for(const k in ST.locked) snap.locked[k]=new Set(ST.locked[k]);
  ST.history.push(snap);
  if(ST.history.length>10) ST.history.shift();
  updateHistBadge();
}
function undo(){
  if(!ST.history.length) return;
  const s=ST.history.pop();
  ST.draft=s.draft; ST.locked=s.locked;
  updateHistBadge(); renderGrid(); renderViolations(); renderStats();
  notify('已還原');
}
function updateHistBadge(){
  const n=ST.history.length;
  ['histBadge','histBadge2'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=`${n}/10`;});
  ['undoBtn','undoBtn2'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=!n;});
}

// ═══════════════════════════════════════════════════
//  GRID
// ═══════════════════════════════════════════════════
function renderGrid(containerId='sg',readOnly=false){
  const req=ST.rules.staffingRequirements||{weekday:{A:1,M:0,P:3},friday:{A:1,M:1,P:3},weekend:{A:1,M:1,P:3}};
  const vioSet=buildVioSet();
  let h='<thead><tr><th class="sn">姓名</th>';
  for(let i=0;i<ST.days.length;i++){
    const dow=ST.daysOfWeek[i]; const dt=getDT(dow);
    const isHol=ST.holidays.includes(i);
    const thCls=[dt==='weekend'?'wknd':dt==='friday'?'fri':'',isHol?'hol':''].filter(Boolean).join(' ');
    h+=`<th class="${thCls}" onclick="toggleHoliday(${i})" title="${isHol?'點擊取消國定假日':'點擊標記為國定假日'}">
      <div class="dh-d">${ST.days[i]}</div>
      <div class="dh-w">${isHol?'假':DOW[dow]||dow}</div>
    </th>`;
  }
  h+='<th>早</th><th>中</th><th>晚</th><th>休</th></tr></thead><tbody>';
  // ── Event rows ──
  const evtDef=[['audit','L&P 審計'],['meeting','開會/月會'],['training','培訓/活動']];
  for(const[type,label] of evtDef){
    h+=`<tr class="evt evt-${type}"><td class="sn sn-evt">${label}</td>`;
    for(let i=0;i<ST.days.length;i++){
      const v=(ST.events[type]||[])[i]||'';
      const dt=getDT(ST.daysOfWeek[i]);const isHol=ST.holidays.includes(i);
      const tdCls='';
      h+=`<td class="${tdCls}"><div class="evt-cell${v?' v':''}" onclick="editEvt('${type}',${i},event)" title="${v}">${v}</div></td>`;
    }
    h+='<td colspan="4"></td></tr>';
  }
  for(const s of ST.monthStaff){
    const sc=ST.draft[s.id]||[];
    const lk=ST.locked[s.id]||new Set();
    const flk=ST.fixedLocked[s.id]||new Set();
    h+=`<tr><td class="sn">${s.name}<span style="font-size:9px;color:${s.type==='PT'?'#F57C00':'#9E9E9E'};margin-left:3px">${s.type}</span>${s.fixedDayOff?`<span style="font-size:8px;color:#E65100;margin-left:3px">📌${DOW[s.fixedDayOff]}</span>`:''}</td>`;
    let A=0,M=0,P=0,off=0;
    for(let i=0;i<ST.days.length;i++){
      const sh=sc[i]||''; const dt=getDT(ST.daysOfWeek[i]);
      const isHol=ST.holidays.includes(i);
      if(sh==='A')A++;else if(sh==='M')M++;else if(sh==='P')P++;
      if(isOff(sh)&&sh)off++;
      const isFixed=flk.has(i);
      const isLk=!isFixed&&lk.has(i);
      const vio=!isFixed&&vioSet[s.id]?.has(i);
      const hasSwap=ST.swapReqs.some(r=>r.staffId===s.id&&r.dayIdx===i&&r.status==='pending');
      const isDo=!isFixed&&(ST.designatedOff[s.id]||new Set()).has(i);
      const isDoLocked=isDo&&!readOnly; // locked in editor, shown as do-mark in result
      const cls=[sh||'empty',isFixed?'fixed-off':isLk?'locked':'',vio?'vio':'',hasSwap?'swap-req':'',isDoLocked?'do-locked':isDo?'do-mark':''].filter(Boolean).join(' ');
      const isPast=isPastDate(i);
      const tdCls=isPast?'past-day':'';
      if(readOnly){
        h+=`<td class="${tdCls}"><div class="cell ${cls}">${sh||'—'}</div></td>`;
      } else {
        h+=`<td class="${tdCls}"><div class="cell ${cls}"
          draggable="${!isFixed&&!isDoLocked}" data-s="${s.id}" data-d="${i}"
          onclick="openPicker('${s.id}',${i},event)"
          ondragstart="onDS('${s.id}',${i})"
          ondragover="onDO(event)"
          ondrop="onDrop('${s.id}',${i},event)"
          ondragleave="onDL(event)"
        >${sh||'—'}</div></td>`;
      }
    }
    h+=`<td style="font-size:10px;color:var(--A);font-weight:700">${A}</td><td style="font-size:10px;color:var(--M);font-weight:700">${M}</td><td style="font-size:10px;color:var(--P);font-weight:700">${P}</td><td style="font-size:10px;color:var(--RL);font-weight:700">${off}</td></tr>`;
  }
  for(const type of ['A','M','P']){
    h+=`<tr class="stat"><td class="sn" style="font-size:10px;padding:0 8px;color:${type==='A'?'var(--A)':type==='M'?'var(--M)':'var(--P)'}">${type==='A'?'早':type==='M'?'中':'晚'}班人數</td>`;
    for(let i=0;i<ST.days.length;i++){
      const dt=getDT(ST.daysOfWeek[i]); const isHol=ST.holidays.includes(i);
      const cnt=ST.monthStaff.filter(s=>(ST.draft[s.id]||[])[i]===type).length;
      const need=(req[dt]||{})[type]||0;
      const cls=need===0?'':(cnt<need?'warn':cnt===need?'exact':'surplus');
      h+=`<td class="${cls}">${cnt}${need>0?`<span class="need-n">/${need}</span>`:''}</td>`;
    }
    h+='<td colspan="4"></td></tr>';
  }
  h+='</tbody>';
  const el=document.getElementById(containerId);
  if(el) el.innerHTML=h;
}

// ═══════════════════════════════════════════════════
//  VIOLATIONS
// ═══════════════════════════════════════════════════
function buildVioSet(){
  const set={};
  for(const v of computeViolations()){
    for(const c of (v.cells||[])){ if(!set[c.s])set[c.s]=new Set(); set[c.s].add(c.d); }
  }
  return set;
}
function computeViolations(){
  const viols=[]; const rules=ST.rules;
  const req=rules.staffingRequirements||{weekday:{A:1,M:0,P:3},friday:{A:1,M:1,P:3},weekend:{A:1,M:1,P:3}};
  const ft=ST.monthStaff.filter(s=>s.type==='FT');
  // 1. Consecutive
  for(const s of ft){
    const sc=ST.draft[s.id]||[]; let streak=0,start=0;
    for(let i=0;i<=sc.length;i++){
      if(i<sc.length&&isWork(sc[i])){ if(!streak)start=i; streak++; }
      else{ if(streak>4){ viols.push({type:'error',code:'consec',msg:`${s.name} 連續上班 ${streak} 天（${ST.days[start]}-${ST.days[start+streak-1]}日）`,cells:Array.from({length:streak},(_,k)=>({s:s.id,d:start+k})),meta:{sid:s.id,start,streak}}); } streak=0; }
    }
  }
  // 2. Per-person monthly weekend off count (每人假日休假 2–3 天)
  const wkendIdx=[];
  for(let i=0;i<ST.days.length;i++){const dow=ST.daysOfWeek[i];if(dow==='Sat'||dow==='Sun')wkendIdx.push(i);}
  for(const s of ST.monthStaff){
    const wkOff=wkendIdx.filter(i=>isOff((ST.draft[s.id]||[])[i])&&(ST.draft[s.id]||[])[i]).length;
    if(wkOff>3) viols.push({type:'error',code:'wkoff',msg:`${s.name} 假日休假 ${wkOff} 天（上限3天）`,cells:wkendIdx.filter(i=>isOff((ST.draft[s.id]||[])[i])&&(ST.draft[s.id]||[])[i]).map(i=>({s:s.id,d:i})),meta:{sid:s.id,wkOff}});
  }
  // 3. Trio co-rest
  const trio=(rules.noSimultaneousOff||[]).map(n=>ST.monthStaff.find(s=>s.id===n||s.name===n)).filter(Boolean);
  for(let i=0;i<ST.days.length;i++){
    const off=trio.filter(s=>isOff((ST.draft[s.id]||[])[i]));
    if(off.length>=3) viols.push({type:'error',code:'trio',msg:`${ST.days[i]}日：${off.map(s=>s.name).join('+')} 三人同休`,cells:off.map(s=>({s:s.id,d:i})),meta:{day:i,trio:off}});
  }
  // 3. Understaffed
  for(let i=0;i<ST.days.length;i++){
    const dt=getDT(ST.daysOfWeek[i]); const r=req[dt]||{};
    for(const t of ['A','M','P']){
      const need=r[t]||0; if(!need) continue;
      const cnt=ST.monthStaff.filter(s=>(ST.draft[s.id]||[])[i]===t).length;
      if(cnt<need) viols.push({type:'warn',code:'under',msg:`${ST.days[i]}日（${DOW[ST.daysOfWeek[i]]}）${t==='A'?'早':t==='M'?'中':'晚'}班 ${cnt}/${need}`,meta:{day:i,t,need,have:cnt}});
    }
  }
  // 4. Early balance
  const ac={}; for(const s of ft) ac[s.id]=(ST.draft[s.id]||[]).filter(x=>x==='A').length;
  const vals=Object.values(ac); if(vals.length>1){
    const mx=Math.max(...vals),mn=Math.min(...vals);
    if(mx-mn>2) viols.push({type:'warn',code:'bal',msg:`早班分配不均：最多 ${mx} 次 vs 最少 ${mn} 次（差 ${mx-mn}）`,meta:{mx,mn,ac}});
  }
  // 5. Days off
  for(const s of ft){
    const off=(ST.draft[s.id]||[]).filter(x=>isOff(x)&&x).length;
    const {min=10,max=11}=rules.daysOffPerMonth||{};
    if(off<min||off>max) viols.push({type:'warn',code:'offcnt',msg:`${s.name} 休假 ${off} 天（應 ${min}-${max} 天）`,meta:{sid:s.id,off,min,max}});
  }
  return viols;
}
function renderViolations(){
  const viols=computeViolations();
  const e=viols.filter(v=>v.type==='error').length, w=viols.filter(v=>v.type==='warn').length;
  document.getElementById('vioCount').textContent=e||w?`${e}錯 ${w}警`:'✅';
  window._viols=viols;
  if(!viols.length){ document.getElementById('vioList').innerHTML='<div style="color:#4CAF50;font-size:12px;padding:4px 0">✅ 本月無違規</div>'; return; }
  document.getElementById('vioList').innerHTML=viols.map((v,i)=>`
    <div class="vio-item" id="vi${i}">
      <div class="vio-main">
        <span class="vbadge ${v.type}">${v.type==='error'?'❌':'⚠'}</span>
        <span class="vmsg">${v.msg}</span>
        <button class="vbtn" onclick="showSug(${i})">修正建議</button>
      </div>
      <div id="sg${i}" class="sug-box" style="display:none"></div>
    </div>`).join('');
}
function showSug(i){
  const v=window._viols[i]; const box=document.getElementById(`sg${i}`);
  if(box.style.display==='block'){box.style.display='none';return;}
  const sug=genSug(v);
  box.innerHTML=`<div style="margin-bottom:6px">${sug.text}</div>
    <div class="sug-act">
      ${sug.apply?`<button class="sa-ok" onclick="applySug(${i})">✓ 接受</button>`:''}
      <button class="sa-no" onclick="document.getElementById('sg${i}').style.display='none'">✕ 關閉</button>
    </div>`;
  box.style.display='block'; v._sug=sug;
}
function applySug(i){
  const v=window._viols[i]; if(!v._sug?.apply){notify('無法自動修正，請手動調整','err');return;}
  pushHistory(); v._sug.apply();
  renderGrid();renderViolations();renderStats();
  document.getElementById(`sg${i}`).style.display='none'; notify('已套用建議');
}
function genSug(v){
  const ft=ST.monthStaff.filter(s=>s.type==='FT');
  switch(v.code){
    case 'consec':{
      const {sid,start,streak}=v.meta; const s=ST.monthStaff.find(x=>x.id===sid);
      const mid=start+Math.floor(streak/2);
      return {text:`建議給 <b>${s.name}</b> 在 <b>${ST.days[mid]}日</b> 安排休假（RL），拆開連續工作段。`,
        apply:()=>setShift(sid,mid,'RL',true)};
    }
    case 'wkoff':{
      const {sid,wkOff}=v.meta; const s=ST.monthStaff.find(x=>x.id===sid);
      const excess=wkOff-3;
      const wkOffDays=Array.from({length:ST.days.length},(_,i)=>i)
        .filter(i=>{const dow=ST.daysOfWeek[i];return(dow==='Sat'||dow==='Sun')&&isOff((ST.draft[sid]||[])[i])&&(ST.draft[sid]||[])[i];});
      const unlocked=wkOffDays.filter(d=>!ST.locked[sid]?.has(d));
      if(!unlocked.length) return {text:`${s.name} 的假日休假均已鎖定，請手動調整。`,apply:null};
      const tgt=unlocked[unlocked.length-1];
      for(let delta=1;delta<14;delta++){
        for(const alt of [tgt+delta,tgt-delta]){
          if(alt<0||alt>=ST.days.length) continue;
          const dow=ST.daysOfWeek[alt];
          if(dow==='Sat'||dow==='Sun') continue;
          if(isWork((ST.draft[sid]||[])[alt])&&!ST.locked[sid]?.has(alt))
            return {text:`建議將 <b>${s.name}</b> 的 ${ST.days[tgt]}日 假日休假移到 ${ST.days[alt]}日（週${DOW[dow]}）。`,
              apply:()=>{setShift(sid,tgt,'P',true);setShift(sid,alt,'RL',true);}};
        }
      }
      return {text:`建議將 <b>${s.name}</b> 的 ${ST.days[tgt]}日 假日休假改為上班（晚班）。`,apply:()=>setShift(sid,tgt,'P',true)};
    }
    case 'trio':{
      const {day,trio}=v.meta; const tgt=trio[trio.length-1];
      const alt=day+1<ST.days.length?day+1:day-1;
      return {text:`建議將 <b>${tgt.name}</b> 的 ${ST.days[day]}日 休假改為 P 晚班，${ST.days[alt]}日 補休。`,
        apply:()=>{setShift(tgt.id,day,'P',true);setShift(tgt.id,alt,'RL',true);}};
    }
    case 'pair':{
      const {day,pair}=v.meta; const tgt=pair[1];
      const alt=day+1<ST.days.length?day+1:day-1;
      return {text:`建議將 <b>${tgt.name}</b> 的 ${ST.days[day]}日 休假移至 ${ST.days[alt]}日。`,
        apply:()=>{setShift(tgt.id,day,'P',true);setShift(tgt.id,alt,'RL',true);}};
    }
    case 'under':{
      const {day,t,need,have}=v.meta;
      const cand=ft.filter(s=>{const sh=(ST.draft[s.id]||[])[day];return sh&&sh!==t&&!ST.locked[s.id]?.has(day);});
      if(!cand.length) return {text:'當日所有員工格子已鎖定，請手動調整。',apply:null};
      const pick=cand[0]; const old=(ST.draft[pick.id]||[])[day];
      return {text:`建議將 <b>${pick.name}</b> 的 ${ST.days[day]}日 從 ${old} 改為 <b>${t}</b>。`,
        apply:()=>setShift(pick.id,day,t,true)};
    }
    case 'bal':{
      const {ac}=v.meta;
      const mx=Math.max(...Object.values(ac)), mn=Math.min(...Object.values(ac));
      const maxS=ft.find(s=>ac[s.id]===mx), minS=ft.find(s=>ac[s.id]===mn);
      for(let i=0;i<ST.days.length;i++){
        if((ST.draft[maxS.id]||[])[i]==='A'&&!ST.locked[maxS.id]?.has(i)&&isWork((ST.draft[minS.id]||[])[i])&&!ST.locked[minS.id]?.has(i)){
          const ms=(ST.draft[minS.id]||[])[i];
          return {text:`建議 ${ST.days[i]}日：<b>${maxS.name}</b> 的 A 與 <b>${minS.name}</b> 的 ${ms} 互換。`,
            apply:()=>{setShift(maxS.id,i,ms,true);setShift(minS.id,i,'A',true);}};
        }
      }
      return {text:'請手動調整早班分配。',apply:null};
    }
    case 'offcnt':{
      const {sid,off,min,max}=v.meta; const s=ST.monthStaff.find(x=>x.id===sid);
      if(off>max){
        for(let i=0;i<ST.days.length;i++){
          if((ST.draft[sid]||[])[i]==='RL'&&!ST.locked[sid]?.has(i))
            return {text:`建議將 <b>${s.name}</b> 的 ${ST.days[i]}日 休假改為 P 晚班（${off}→${off-1}天休）。`,apply:()=>setShift(sid,i,'P',false)};
        }
      } else {
        for(let i=0;i<ST.days.length;i++){
          if(isWork((ST.draft[sid]||[])[i])&&!ST.locked[sid]?.has(i))
            return {text:`建議將 <b>${s.name}</b> 的 ${ST.days[i]}日 改為 RL 休假（${off}→${off+1}天休）。`,apply:()=>setShift(sid,i,'RL',false)};
        }
      }
      return {text:'請手動調整休假天數。',apply:null};
    }
    default: return {text:'請手動調整。',apply:null};
  }
}

function renderStats(){
  let h='<table style="width:100%;border-collapse:collapse;font-size:11px"><tr style="color:#888"><th style="text-align:left;padding:3px 0">姓名</th><th>A早</th><th>M中</th><th>P晚</th><th>休</th></tr>';
  for(const s of ST.monthStaff){
    const sc=ST.draft[s.id]||[];
    const A=sc.filter(x=>x==='A').length,M=sc.filter(x=>x==='M').length,P=sc.filter(x=>x==='P').length;
    const off=sc.filter(x=>isOff(x)&&x).length;
    h+=`<tr><td style="padding:3px 0;font-weight:600">${s.name}</td><td style="color:var(--A)">${A}</td><td style="color:var(--M)">${M}</td><td style="color:var(--P)">${P}</td><td style="color:var(--RL)">${off}</td></tr>`;
  }
  document.getElementById('statsBox').innerHTML=h+'</table>';
}

// ═══════════════════════════════════════════════════
//  PICKER
// ═══════════════════════════════════════════════════
function applyFixedLocked(){
  for(const s of ST.monthStaff){
    if(!ST.fixedLocked[s.id]) ST.fixedLocked[s.id]=new Set();
    if(!ST.locked[s.id]) ST.locked[s.id]=new Set();
    if(!ST.draft[s.id]) ST.draft[s.id]=new Array(ST.days.length).fill(null);
    if(s.fixedDayOff){
      for(let d=0;d<ST.days.length;d++){
        if(ST.daysOfWeek[d]===s.fixedDayOff){
          ST.draft[s.id][d]='RL';
          ST.fixedLocked[s.id].add(d);
        }
      }
    }
  }
}
function wizSetFixed(i,val){
  ST.monthStaff[i].fixedDayOff=val||null;
  applyFixedLocked();
  renderWizStaff();
}
function toggleHoliday(idx){
  const pos=ST.holidays.indexOf(idx);
  if(pos>=0) ST.holidays.splice(pos,1); else ST.holidays.push(idx);
  renderGrid(); renderViolations();
  notify(ST.holidays.includes(idx)?`${ST.days[idx]}日 標記為國定假日`:`${ST.days[idx]}日 取消國定假日`);
}
function openPicker(sid,day,e){
  e.stopPropagation();
  if(isPastDate(day)){ return; }
  if(ST.fixedLocked[sid]?.has(day)){
    const s=ST.monthStaff.find(x=>x.id===sid);
    notify(`${s?.name} ${ST.days[day]}日為固定休假日（📌），無法修改`,'err'); return;
  }
  if((ST.designatedOff[sid]||new Set()).has(day)){
    notify('指定休假日已鎖定，請按「← 修改指定休假」回上一步調整','err'); return;
  }
  pkStaff=sid; pkDay=day;
  const s=ST.monthStaff.find(x=>x.id===sid);
  const sh=(ST.draft[sid]||[])[day]||'';
  const isLk=ST.locked[sid]?.has(day);
  document.getElementById('pkTitle').textContent=`${s.name} · ${ST.days[day]}日（${DOW[ST.daysOfWeek[day]]}）`;
  document.getElementById('pkLock').textContent=isLk?'🔓 解鎖':'🔒 鎖定';
  const pk=document.getElementById('picker'); pk.classList.add('show');
  pk.style.left=Math.min(e.clientX,window.innerWidth-270)+'px';
  pk.style.top=Math.min(e.clientY+6,window.innerHeight-220)+'px';
}
function closePicker(){ document.getElementById('picker').classList.remove('show'); pkStaff=pkDay=null; }
function pick(sh){
  if(pkStaff===null) return; pushHistory();
  setShift(pkStaff,pkDay,sh,true);
  closePicker(); renderGrid(); renderViolations(); renderStats();
}
function pkToggleLock(){
  if(pkStaff===null) return;
  const lk=ST.locked[pkStaff];
  if(lk.has(pkDay)) lk.delete(pkDay); else lk.add(pkDay);
  closePicker(); renderGrid();
}
function setShift(sid,day,sh,lock){
  if(!ST.draft[sid]) ST.draft[sid]=new Array(ST.days.length).fill(null);
  ST.draft[sid][day]=sh||null;
  if(lock&&sh) ST.locked[sid].add(day);
  ST.dirty=true;
}

// ═══════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════
function onDS(s,d){ dragS=s; dragD=d; }
function onDO(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDL(e){ e.currentTarget.classList.remove('drag-over'); }
function onDrop(s,d,e){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(!dragS||dragS===s&&dragD===d){ dragS=null; return; }
  if(isPastDate(dragD)||isPastDate(d)){ notify('過去日期無法修改','err'); dragS=null; return; }
  if(ST.fixedLocked[dragS]?.has(dragD)||ST.fixedLocked[s]?.has(d)){
    notify('固定休假日（📌）無法拖拉調換','err'); dragS=null; return;
  }
  if((ST.designatedOff[dragS]||new Set()).has(dragD)||(ST.designatedOff[s]||new Set()).has(d)){
    notify('指定休假日已鎖定，無法拖拉','err'); dragS=null; return;
  }
  const s1=(ST.draft[dragS]||[])[dragD]; const s2=(ST.draft[s]||[])[d];
  if(dragD!==d){ notify('只能和同一天的人換班','err'); dragS=null; return; }
  if(s1!==s2){ notify(`只能和相同時段（${s1||'休'}）的人換班，目標是 ${s2||'休'}`,'err'); dragS=null; return; }
  pushHistory();
  setShift(dragS,dragD,s2||null,true); setShift(s,d,s1||null,true);
  dragS=null; renderGrid(); renderViolations(); renderStats();
}

// ═══════════════════════════════════════════════════
//  AUTO SCHEDULER
// ═══════════════════════════════════════════════════
function autoSchedule(){
  const ft=ST.monthStaff.filter(s=>s.type==='FT');
  if(!ft.length){ notify('沒有正職員工可排班','err'); return; }
  pushHistory();
  const n=ST.days.length;
  const req=ST.rules.staffingRequirements||{weekday:{A:1,M:0,P:3},friday:{A:1,M:1,P:3},weekend:{A:1,M:1,P:3}};
  const noCoOff=(ST.rules.noSimultaneousOff||[]).map(nm=>ST.monthStaff.find(s=>s.id===nm||s.name===nm)).filter(Boolean).map(s=>s.id);
  // Pre-lock designated off days
  for(const s of ft){
    const doff=ST.designatedOff[s.id];
    if(doff){ for(const d of doff){ if(d>=0&&d<n){ ST.locked[s.id].add(d); ST.draft[s.id][d]='RL'; } } }
  }
  const sched={};
  for(const s of ft){ sched[s.id]=Array.from({length:n},(_,i)=>ST.locked[s.id]?.has(i)?(ST.draft[s.id]||[])[i]||null:null); }
  const shuffled=sfl([...ft]);
  const TARGET=ST.rules.daysOffPerMonth?.min||10;
  const MAXC=ST.rules.maxConsecutiveWorkDays||4;
  const PREFC=3; // preferred consecutive work days
  const minNeeded={weekday:4,friday:5,weekend:5};
  const dailyOffCap=ST.daysOfWeek.map(dow=>{
    if(dow==='Sat'||dow==='Sun') return Math.max(1,Math.floor(ft.length/2));
    return Math.max(1, ft.length-(minNeeded[getDT(dow)]||4));
  });
  // Track off count per day (start from locked cells)
  const dailyOff=new Array(n).fill(0);
  for(const s of ft) for(let d=0;d<n;d++) if(sched[s.id][d]&&isOff(sched[s.id][d])) dailyOff[d]++;
  // Per-person weekend off cap (max 3)
  const MAX_WK_OFF=3;
  const wkDays=Array.from({length:n},(_,i)=>i).filter(i=>ST.daysOfWeek[i]==='Sat'||ST.daysOfWeek[i]==='Sun');
  // Phase 1: off days
  for(const s of shuffled){
    const alreadyOff=sched[s.id].filter(x=>x&&isOff(x)).length;
    const alreadyWkOff=wkDays.filter(d=>sched[s.id][d]&&isOff(sched[s.id][d])).length;
    placeOffDays(s.id,Math.max(0,TARGET-alreadyOff),sched,noCoOff,MAXC,PREFC,n,dailyOff,dailyOffCap,wkDays,MAX_WK_OFF-alreadyWkOff);
    for(let d=0;d<n;d++) if(sched[s.id][d]===null) sched[s.id][d]='__W';
  }
  // Phase 2: shift types
  for(let d=0;d<n;d++){
    const dt=getDT(ST.daysOfWeek[d]); const r=req[dt]||{A:1,M:0,P:3};
    const working=sfl(shuffled.filter(s=>sched[s.id][d]==='__W'));
    const lkA=ft.filter(s=>sched[s.id][d]==='A').length;
    const lkM=ft.filter(s=>sched[s.id][d]==='M').length;
    // Dynamic M: add 1 middle shift on weekdays when ≥5 people are working
    const totalWorking=working.length+lkA+lkM+ft.filter(s=>sched[s.id][d]==='P').length;
    const baseM=(r.M||0)||(dt==='weekday'&&totalWorking>=5?1:0);
    const nA=Math.max(0,(r.A||0)-lkA), nM=Math.max(0,baseM-lkM);
    working.sort((a,b)=>{const ca=sched[a.id].filter(x=>x==='A').length,cb=sched[b.id].filter(x=>x==='A').length;return ca-cb+(Math.random()-.5)*.4;});
    let idx=0;
    for(let i=0;i<nA&&idx<working.length;i++,idx++) sched[working[idx].id][d]='A';
    for(let i=0;i<nM&&idx<working.length;i++,idx++) sched[working[idx].id][d]='M';
    for(;idx<working.length;idx++) sched[working[idx].id][d]='P';
  }
  // Commit
  for(const s of ft){
    if(!ST.draft[s.id]) ST.draft[s.id]=new Array(n).fill(null);
    for(let d=0;d<n;d++){
      if(!ST.locked[s.id]?.has(d)){
        const v=sched[s.id][d]; ST.draft[s.id][d]=(v==='__W'||!v)?'P':v;
      }
    }
  }
  ST.dirty=true;
  renderGrid(); renderViolations(); renderStats();
  notify('自動排班完成，可手動調整');
}
function placeOffDays(sid,need,sched,noCoOff,maxC,prefC,n,dailyOff,dailyOffCap,wkDays,wkRemain){
  const sc=sched[sid];
  const inTrio=noCoOff.includes(sid);
  const wkSet=new Set(wkDays||[]);
  let wkLeft=wkRemain??99;
  function canPlace(d,relaxTrio,relaxCap){
    if(sc[d]!==null) return false;
    if(wkSet.has(d)&&wkLeft<=0) return false; // personal weekend cap
    if(!relaxCap&&dailyOff[d]>=dailyOffCap[d]) return false;
    if(!relaxTrio&&inTrio){
      const co=noCoOff.filter(x=>x!==sid&&sched[x]&&sched[x][d]==='RL').length;
      if(co>=2) return false;
    }
    return true;
  }
  function placeAt(d){ sc[d]='RL'; dailyOff[d]++; if(wkSet.has(d))wkLeft--; }
  function longestRun(){
    let best={len:0,mid:0},runStart=0,runLen=0;
    for(let i=0;i<=n;i++){
      const x=i<n?sc[i]:null;
      const isW=(x===null||x==='__W'||(x&&!isOff(x)));
      if(i<n&&isW){ if(!runLen)runStart=i; runLen++; }
      else{ if(runLen>best.len){best={len:runLen,mid:runStart+Math.floor(runLen/2)};} runLen=0; }
    }
    return best;
  }
  let picked=0;
  // Pass 1: break runs > preferred (3 days), full constraints
  while(picked<need){
    const {len,mid}=longestRun();
    if(len<=prefC) break;
    let placed=false;
    for(let delta=0;delta<=len&&!placed;delta++){
      for(const d of [mid-delta,mid+delta]){
        if(d>=0&&d<n&&canPlace(d,false,false)){ placeAt(d); picked++; placed=true; break; }
      }
    }
    if(!placed) break;
  }
  // Pass 2: break runs > hard max (4 days), relax cap if needed
  while(picked<need){
    const {len,mid}=longestRun();
    if(len<=maxC) break;
    let placed=false;
    for(let delta=0;delta<=len&&!placed;delta++){
      for(const d of [mid-delta,mid+delta]){
        if(d>=0&&d<n&&canPlace(d,false,true)){ placeAt(d); picked++; placed=true; break; }
      }
    }
    if(!placed) break;
  }
  // Pass 3: fill remaining randomly, full constraints
  const avail=sfl(Array.from({length:n},(_,i)=>i).filter(d=>sc[d]===null));
  for(const d of avail){ if(picked>=need)break; if(canPlace(d,false,false)){placeAt(d);picked++;} }
  // Relax trio
  for(const d of avail){ if(picked>=need)break; if(canPlace(d,true,false)){placeAt(d);picked++;} }
  // Relax cap (last resort)
  for(const d of avail){ if(picked>=need)break; if(sc[d]===null){placeAt(d);picked++;} }
}
function sfl(a){ for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function clearUnlocked(){
  if(!confirm('清除所有未鎖定的格子？')) return;
  pushHistory();
  for(const s of ST.monthStaff){ const lk=ST.locked[s.id]||new Set(); (ST.draft[s.id]||[]).forEach((_,i)=>{if(!lk.has(i))ST.draft[s.id][i]=null;}); }
  renderGrid(); renderViolations(); renderStats();
}

// ═══════════════════════════════════════════════════
//  SWAP REQUESTS
// ═══════════════════════════════════════════════════
function openSwapModal(){
  document.getElementById('swapStaff').innerHTML=ST.monthStaff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  document.getElementById('swapDay').innerHTML=ST.days.map((d,i)=>`<option value="${i}">${d}日（${DOW[ST.daysOfWeek[i]]}）</option>`).join('');
  document.getElementById('swapNote').value='';
  document.getElementById('swapModal').classList.add('show');
}
function submitSwap(){
  const sid=document.getElementById('swapStaff').value;
  const dayIdx=+document.getElementById('swapDay').value;
  const toShift=document.getElementById('swapTo').value;
  const note=document.getElementById('swapNote').value.trim();
  const fromShift=(ST.draft[sid]||[])[dayIdx]||'—';
  ST.swapReqs.push({staffId:sid,dayIdx,fromShift,toShift,note,status:'pending',id:Date.now()});
  closeModal('swapModal'); renderGrid(); renderSwapPanel();
  notify('已記錄調班申請');
}
function approveSwap(id){
  const r=ST.swapReqs.find(x=>x.id===id); if(!r)return;
  pushHistory(); setShift(r.staffId,r.dayIdx,r.toShift,true); r.status='approved';
  renderGrid();renderViolations();renderStats();renderSwapPanel(); notify('已核准並套用');
}
function rejectSwap(id){
  const r=ST.swapReqs.find(x=>x.id===id); if(!r)return;
  r.status='rejected'; renderSwapPanel(); notify('已拒絕申請');
}
function renderSwapPanel(){
  const pending=ST.swapReqs.filter(r=>r.status==='pending');
  const el=document.getElementById('swapList');
  if(!pending.length){el.innerHTML='<div style="color:#AAA;font-size:12px">無申請中的調班</div>';return;}
  el.innerHTML=pending.map(r=>{
    const s=ST.monthStaff.find(x=>x.id===r.staffId);
    return `<div class="swap-item">
      <div><span class="swbadge">申請中</span><b>${s?.name||r.staffId}</b> &nbsp;${ST.days[r.dayIdx]}日（${DOW[ST.daysOfWeek[r.dayIdx]]}）</div>
      <div style="margin-top:4px">${r.fromShift} → <b>${r.toShift}</b>${r.note?` · <span style="color:#888">${r.note}</span>`:''}</div>
      <div class="sw-act">
        <button class="sw-ok" onclick="approveSwap(${r.id})">✓ 核准</button>
        <button class="sw-no" onclick="rejectSwap(${r.id})">✕ 拒絕</button>
      </div>
    </div>`;
  }).join('');
}

function isLocked(month){
  if(!month) return false;
  const [y,m]=month.split('-').map(Number);
  return new Date()>=new Date(y,m,1);
}
function updateLockUI(){
  const lk=isLocked(ST.currentMonth);
  const lb=document.getElementById('lockBanner');
  if(lb) lb.style.display=lk?'block':'none';
  document.querySelectorAll('.editor-toolbar .btn:not(#printBtn):not([onclick="wizGo(1)"])').forEach(b=>b.disabled=lk);
}

function showNewMonthModal(){
  const [y,m]=ST.currentMonth?ST.currentMonth.split('-').map(Number):[2026,4];
  document.getElementById('nmInput').value=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;
  document.getElementById('newMonthModal').classList.add('show');
}
async function createMonth(){
  const m=document.getElementById('nmInput').value.trim();
  if(!/^\d{4}-\d{2}$/.test(m)){notify('格式錯誤，請輸入 YYYY-MM','err');return;}
  if(!ST.months.includes(m)){ST.months.push(m);ST.months.sort();}
  closeModal('newMonthModal');
  await loadResultPage();
  await loadResultMonth(m);
}
function toggleSb(id){
  const b=document.getElementById('sb-'+id);
  b.style.display=b.style.display==='none'?'block':'none';
}
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

function getPAT(){
  const cached=localStorage.getItem('gloria_pat')||'';
  const t=prompt('GitHub Personal Access Token：',cached);
  if(t===null) return '';
  localStorage.setItem('gloria_pat',t.trim());
  return t.trim();
}
const REPO='VitoKOK-lab/gloria-schedule';
async function ghPut(path,content,msg){
  const pat=getPAT(); if(!pat) return false;
  const r1=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{headers:{'Authorization':`token ${pat}`}});
  const sha=r1.ok?(await r1.json()).sha:null;
  const body={message:msg,content:btoa(unescape(encodeURIComponent(content)))};
  if(sha) body.sha=sha;
  const r2=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{
    method:'PUT',headers:{'Authorization':`token ${pat}`,'Content-Type':'application/json'},
    body:JSON.stringify(body)});
  if(!r2.ok) localStorage.removeItem('gloria_pat'); // 若失敗清掉 token 讓下次重新輸入
  return r2.ok;
}
function dlJson(filename,data){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2));
  a.download=filename; a.click();
}
async function downloadSchedule(){
  if(!ST.currentMonth){notify('請先選擇月份','err');return;}
  const sc=buildSC();
  const btn=document.getElementById('pubBtn');
  if(btn){btn.textContent='發佈中…'; btn.disabled=true;}
  const [ok1,ok2,ok3]=await Promise.all([
    ghPut(`data/schedule_${ST.currentMonth.replace('-','_')}.json`,JSON.stringify(sc,null,2),`更新 ${ST.currentMonth} 班表`),
    ghPut('data/months.json',JSON.stringify({months:ST.months},null,2),'更新月份索引'),
    ghPut('data/staff.json',JSON.stringify({staff:ST.staff,rules:ST.rules},null,2),'更新員工資料'),
  ]);
  if(btn){btn.disabled=false; btn.textContent='📤 發佈班表';}
  if(ok1){
    // 下載本地備份（檔名加時間戳記）
    const ts=new Date().toISOString().slice(0,16).replace(/[-T:]/g,'').replace('T','_');
    setTimeout(()=>dlJson(`schedule_${ST.currentMonth.replace('-','_')}_${ts}.json`,sc),200);
    ST.dirty=false;
    notify('✅ 已發佈並下載本地備份，員工約 1 分鐘後可看到');
  } else {
    notify('⚠ 發佈失敗，請確認 Token 權限','err');
  }
}
function buildSC(){
  const sc={month:ST.currentMonth,days:ST.days,daysOfWeek:ST.daysOfWeek,
    holidays:ST.holidays,events:ST.events,
    staff:ST.monthStaff.map(s=>s.id),schedules:{},swapRequests:ST.swapReqs,
    designatedOff:Object.fromEntries(Object.entries(ST.designatedOff).map(([id,set])=>[id,[...set]]))};
  for(const s of ST.monthStaff) sc.schedules[s.id]=(ST.draft[s.id]||[]).map(x=>x||'');
  return sc;
}

let _evtType=null,_evtDay=null;
const EVT_LABELS={audit:'L&P 審計',meeting:'開會／月會',training:'培訓／活動'};
function editEvt(type,dayIdx,e){
  if(isLocked(ST.currentMonth)){notify('月份已鎖定，無法修改','err');return;}
  e.stopPropagation();
  _evtType=type;_evtDay=dayIdx;
  document.getElementById('evtPopTitle').textContent=`${EVT_LABELS[type]} · ${ST.days[dayIdx]}日（${DOW[ST.daysOfWeek[dayIdx]]}）`;
  document.getElementById('evtInput').value=(ST.events[type]||[])[dayIdx]||'';
  const p=document.getElementById('evtPop');
  p.classList.add('show');
  p.style.left=Math.min(e.clientX,window.innerWidth-230)+'px';
  p.style.top=Math.min(e.clientY+6,window.innerHeight-130)+'px';
  setTimeout(()=>document.getElementById('evtInput').focus(),30);
}
function saveEvt(){
  if(_evtType===null)return;
  if(!ST.events[_evtType]) ST.events[_evtType]=new Array(ST.days.length).fill('');
  ST.events[_evtType][_evtDay]=document.getElementById('evtInput').value.trim();
  closeEvtPop();renderGrid();ST.dirty=true;
}
function clearEvt(){
  if(_evtType===null)return;
  if(!ST.events[_evtType]) ST.events[_evtType]=new Array(ST.days.length).fill('');
  ST.events[_evtType][_evtDay]='';
  closeEvtPop();renderGrid();ST.dirty=true;
}
function closeEvtPop(){document.getElementById('evtPop').classList.remove('show');_evtType=_evtDay=null;}

async function loadResultPage(){
  const sorted=[...ST.months].sort().reverse();
  document.getElementById('result-month-list').innerHTML=sorted.length
    ? sorted.map(m=>`<div class="rm-item" data-m="${m}" onclick="loadResultMonth('${m}')">${m}</div>`).join('')
    : '<div style="padding:12px 14px;font-size:12px;color:#AAA">尚無班表</div>';
  if(sorted.length) await loadResultMonth(sorted[0]);
}
async function loadResultMonth(m){
  document.querySelectorAll('.rm-item').forEach(el=>el.classList.toggle('active',el.dataset.m===m));
  document.getElementById('result-print-btn').style.display='inline-flex';
  await loadMonthData(m);
  const lkLabel=isLocked(m)?'<span class="rm-lk">🔒</span>':'<span class="rm-nl">編輯中</span>';
  document.getElementById('result-title').innerHTML=`${m} 班表 &nbsp;${lkLabel}`;
  const item=document.querySelector(`.rm-item[data-m="${m}"]`);
  if(item) item.innerHTML=`${m} ${isLocked(m)?'<span class="rm-lk">🔒</span>':'<span class="rm-nl">編輯中</span>'}`;
  renderGrid('result-sg',true);
}

//  SCHEDULE WIZARD
// ═══════════════════════════════════════════════════
function getNextSchedMonth(){
  const [y,m]=todayMonth().split('-').map(Number);
  return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;
}
async function initSchedulePage(){
  const nm=getNextSchedMonth();
  document.getElementById('wiz-month-label').textContent=nm+' 排班設定';
  if(!ST.months.includes(nm)) ST.months.push(nm);
  await loadMonthData(nm);
  updateHistBadge();
  updateLockUI();
  renderWizStaff();
  wizGo(1);
}
function wizGo(step){
  ST.wizStep=step;
  document.getElementById('wiz-s1').style.display=step===1?'':'none';
  document.getElementById('wiz-s3').style.display=step===3?'flex':'none';
  document.querySelector('.ws1')?.classList.toggle('ws-active',step===1);
  document.querySelector('.ws3')?.classList.toggle('ws-active',step===3);
  if(step===3){
    applyFixedLocked();
    const hasSchedule=ST.monthStaff.some(s=>(ST.draft[s.id]||[]).some(x=>x&&x!=='RL'));
    if(!hasSchedule) autoSchedule();
    else { renderGrid(); renderViolations(); renderStats(); renderSwapPanel(); }
  }
}
function renderWizDOStep(){
  document.getElementById('wiz-do-list').innerHTML=ST.monthStaff.map(s=>{
    const cnt=(ST.designatedOff[s.id]||new Set()).size;
    return `<div class="do-list-row">
      <span style="flex:1;font-weight:600">${s.name}</span>
      <button class="btn bd" onclick="openDoModal('${s.id}')" style="padding:3px 12px;font-size:11px">${cnt?`<b style="color:#C62828">已選 ${cnt} 天</b>`:'選擇日期'}</button>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════
//  MONTH DATA LOADER
// ═══════════════════════════════════════════════════
async function loadMonthData(month){
  ST.currentMonth=month;
  ST.draft={};ST.locked={};ST.fixedLocked={};ST.designatedOff={};ST.history=[];ST.swapReqs=[];ST.holidays=[];
  try{
    const sc=await fetch(`data/schedule_${month.replace('-','_')}.json?t=${Date.now()}`).then(r=>r.json());
    ST.daysOfWeek=sc.daysOfWeek; ST.days=sc.days;
    ST.holidays=(sc.holidays&&sc.holidays.length>0)?sc.holidays:getAutoHolidays(month);
    ST.monthStaff=(sc.staff||[]).map(id=>ST.staff.find(s=>s.id===id)||{id,name:id,type:'FT'});
    for(const id of (sc.staff||[])){
      ST.draft[id]=[...(sc.schedules[id]||[])];
      ST.locked[id]=new Set();
    }
    ST.swapReqs=sc.swapRequests||[];
    if(sc.designatedOff){ for(const[id,days]of Object.entries(sc.designatedOff)) ST.designatedOff[id]=new Set(days); }
    const _n=sc.days.length;
    const _mk=arr=>Array.isArray(arr)&&arr.length===_n?arr.map(v=>v||''):new Array(_n).fill('');
    ST.events={audit:_mk((sc.events||{}).audit),meeting:_mk((sc.events||{}).meeting),training:_mk((sc.events||{}).training)};
    applyFixedLocked();
    return true;
  } catch(e){
    const [y,mo]=month.split('-').map(Number);
    const dim=new Date(y,mo,0).getDate();
    ST.days=Array.from({length:dim},(_,i)=>i+1);
    ST.daysOfWeek=calcDOW(y,mo,dim);
    ST.holidays=getAutoHolidays(month);
    ST.monthStaff=ST.staff.map(s=>({...s}));
    for(const s of ST.monthStaff){ ST.draft[s.id]=new Array(dim).fill(null); ST.locked[s.id]=new Set(); }
    ST.events={audit:new Array(dim).fill(''),meeting:new Array(dim).fill(''),training:new Array(dim).fill('')};
    applyFixedLocked();
    return false;
  }
}

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));

  if(p==='schedule') initSchedulePage();
}
function notify(msg,type=''){
  const el=document.createElement('div');el.className='ni'+(type?' '+type:'');el.textContent=msg;
  document.getElementById('notif').appendChild(el); setTimeout(()=>el.remove(),3500);
}
document.addEventListener('click',e=>{
  if(!document.getElementById('picker').contains(e.target))closePicker();
  if(!document.getElementById('evtPop').contains(e.target))closeEvtPop();
});
