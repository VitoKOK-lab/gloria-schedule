<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloria 排班管理</title>
<style>
:root{
  --A:#388E3C;--A-bg:#E8F5E9;--M:#F57C00;--M-bg:#FFF3E0;
  --P:#1976D2;--P-bg:#E3F2FD;--RL:#757575;--RL-bg:#F5F5F5;
  --AL:#7B1FA2;--AL-bg:#F3E5F5;--SL:#D32F2F;--SL-bg:#FFEBEE;
  --OL:#455A64;--OL-bg:#ECEFF1;--SP:#C2185B;--SP-bg:#FCE4EC;
  --accent:#1a1a2e;--warn:#E65100;--err:#B71C1C;
  --swap:#FF6F00;--swap-bg:#FFF8E1;
}
/* Month lock banner */
#lockBanner{display:none;background:#B71C1C;color:#fff;padding:8px 20px;font-size:13px;font-weight:600;text-align:center;letter-spacing:.3px}
/* Swap request cells */
.cell.swap-req{outline:2px dashed var(--swap);outline-offset:-2px;border-radius:3px;position:relative}
.cell.swap-req::before{content:'申';position:absolute;top:1px;left:1px;font-size:7px;background:var(--swap);color:#fff;border-radius:2px;padding:0 2px;font-weight:700}
/* Swap panel */
.swap-item{border-radius:6px;border:1px solid #FFE0B2;background:#FFF8E1;padding:7px 9px;margin-bottom:6px;font-size:12px}
.swap-item .sw-head{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.swap-badge{background:var(--swap);color:#fff;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700}
.swap-item .sw-actions{display:flex;gap:5px;margin-top:5px}
.sw-actions button{padding:3px 9px;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600}
.sw-accept{background:#4CAF50;color:#fff}.sw-reject{background:#EEE;color:#555}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#F0F2F5;min-height:100vh;font-size:14px}
/* ── Header ── */
header{background:var(--accent);color:#fff;padding:0 20px;display:flex;align-items:center;height:52px;gap:24px;box-shadow:0 2px 8px rgba(0,0,0,.3);position:sticky;top:0;z-index:100}
header h1{font-size:17px;font-weight:700;white-space:nowrap}
.tabs{display:flex;gap:2px;margin-left:8px}
.tabs button{background:none;border:none;color:rgba(255,255,255,.6);padding:6px 14px;cursor:pointer;border-radius:6px;font-size:13px;transition:.15s}
.tabs button.active,.tabs button:hover{background:rgba(255,255,255,.15);color:#fff}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.22)}
.btn-ghost:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:#4CAF50;color:#fff}
.btn-primary:hover{background:#43A047}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-warn{background:#FF9800;color:#fff}
.btn-warn:hover{background:#F57C00}
.btn-danger{background:#F44336;color:#fff}
.btn-danger:hover{background:#D32F2F}
/* ── Month bar ── */
.monthbar{background:#fff;border-bottom:1px solid #E0E0E0;padding:9px 20px;display:flex;align-items:center;gap:10px}
.monthbar select{border:1px solid #DDD;padding:4px 10px;border-radius:6px;font-size:14px;font-weight:600}
/* ── Layout ── */
.page{display:none;height:calc(100vh - 52px);overflow:hidden}
.page.active{display:flex;flex-direction:column}
.schedule-page{flex:1;display:flex;overflow:hidden;flex-direction:column}
.toolbar{background:#fff;border-bottom:1px solid #EEE;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tool-sep{width:1px;height:24px;background:#E0E0E0;margin:0 4px}
.main-area{flex:1;display:flex;overflow:hidden}
.grid-area{flex:1;overflow:auto;padding:12px}
.sidebar{width:320px;border-left:1px solid #E0E0E0;background:#fff;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
/* ── Grid ── */
table.sched{border-collapse:collapse;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);min-width:900px}
table.sched th{background:var(--accent);color:#fff;padding:6px 2px;font-size:11px;text-align:center;position:sticky;top:0;z-index:2;white-space:nowrap}
table.sched th.sticky-name{position:sticky;left:0;z-index:3;min-width:80px}
table.sched td{border:1px solid #EBEBEB;padding:0;text-align:center}
table.sched td.sticky-name{position:sticky;left:0;z-index:1;background:#FAFAFA;font-weight:600;font-size:13px;padding:0 8px;border-right:2px solid #DDD;white-space:nowrap;min-width:80px}
.dh-d{font-size:12px;font-weight:700}.dh-w{font-size:9px;opacity:.65}
th.wknd{background:#2a2a50}th.fri{background:#1e3a5e}
td.wknd-bg{background:#FFFDE7}
.cell{height:32px;width:32px;min-width:32px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;cursor:pointer;position:relative;user-select:none;transition:opacity .1s}
.cell:hover{opacity:.75}
.cell.A{background:var(--A-bg);color:var(--A)}
.cell.M{background:var(--M-bg);color:var(--M)}
.cell.P{background:var(--P-bg);color:var(--P)}
.cell.RL,.cell.RL-{background:var(--RL-bg);color:var(--RL)}
.cell.AL{background:var(--AL-bg);color:var(--AL)}
.cell.SL{background:var(--SL-bg);color:var(--SL)}
.cell.OL{background:var(--OL-bg);color:var(--OL)}
.cell.生理假{background:var(--SP-bg);color:var(--SP)}
.cell.empty{color:#CCC}
.cell.locked::after{content:'🔒';position:absolute;top:1px;right:1px;font-size:7px}
.cell.vio{outline:2px solid #F44336;outline-offset:-2px;border-radius:2px}
.cell.drag-over{outline:2px dashed #1976D2;outline-offset:-2px}
/* drag */
.cell[draggable=true]{cursor:grab}
.cell[draggable=true]:active{cursor:grabbing}
/* stat rows */
tr.stat td{height:18px;font-size:10px;background:#F9F9F9}
tr.stat td.warn{color:#D32F2F;font-weight:700}
/* ── Shift picker popup ── */
#picker{display:none;position:fixed;z-index:200;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.2);padding:10px;min-width:260px}
#picker.show{display:block}
.picker-name{font-weight:700;font-size:13px;margin-bottom:8px;color:#333;border-bottom:1px solid #EEE;padding-bottom:6px}
.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.popt{padding:8px 4px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:.1s}
.popt:hover{filter:brightness(.9)}
.popt.A{background:var(--A-bg);color:var(--A)}
.popt.M{background:var(--M-bg);color:var(--M)}
.popt.P{background:var(--P-bg);color:var(--P)}
.popt.RL{background:var(--RL-bg);color:var(--RL)}
.popt.AL{background:var(--AL-bg);color:var(--AL)}
.popt.SL{background:var(--SL-bg);color:var(--SL)}
.popt.OL{background:var(--OL-bg);color:var(--OL)}
.popt.生理假{background:var(--SP-bg);color:var(--SP)}
.popt.clear{background:#FFF3E0;color:#E65100}
.popt.unlock{background:#F3E5F5;color:#7B1FA2;grid-column:span 2}
.picker-actions{margin-top:8px;display:flex;gap:6px}
.picker-actions button{flex:1;padding:5px;border:none;border-radius:5px;cursor:pointer;font-size:12px}
/* ── Sidebar sections ── */
.s-section{border:1px solid #EEE;border-radius:8px;overflow:hidden}
.s-head{background:#F7F7F7;padding:8px 12px;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.s-body{padding:10px 12px}
/* Violations */
.vio-list{display:flex;flex-direction:column;gap:6px}
.vio-item{border-radius:6px;overflow:hidden;border:1px solid #EEE}
.vio-main{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;cursor:default}
.vio-badge{flex-shrink:0;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:700}
.vio-badge.error{background:#FFEBEE;color:#D32F2F}
.vio-badge.warn{background:#FFF3E0;color:#E65100}
.vio-msg{font-size:12px;flex:1;color:#333;line-height:1.4}
.vio-btn{margin-left:4px;flex-shrink:0;background:#E3F2FD;color:#1976D2;border:none;padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;white-space:nowrap}
.vio-btn:hover{background:#BBDEFB}
.suggestion-box{background:#F8FFF8;border-top:1px solid #E8F5E9;padding:8px 10px;font-size:12px}
.suggestion-box .sug-title{font-weight:600;color:#2E7D32;margin-bottom:4px}
.suggestion-box .sug-detail{color:#444;line-height:1.5;margin-bottom:6px}
.suggestion-box .sug-actions{display:flex;gap:6px}
.sug-actions button{padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:500}
.sug-accept{background:#4CAF50;color:#fff}
.sug-accept:hover{background:#43A047}
.sug-close{background:#EEE;color:#555}
.sug-close:hover{background:#DDD}
/* Staff page */
.staff-page{flex:1;overflow-y:auto;padding:20px}
.staff-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px;max-width:600px}
.staff-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #F5F5F5}
.staff-row:last-child{border-bottom:none}
.staff-name{font-weight:600;flex:1}
.staff-type{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.staff-type.FT{background:#E3F2FD;color:#1976D2}
.staff-type.PT{background:#FFF3E0;color:#E65100}
.staff-form{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.staff-form input{flex:1;min-width:100px;padding:7px 10px;border:1px solid #DDD;border-radius:7px;font-size:13px}
.staff-form select{padding:7px 10px;border:1px solid #DDD;border-radius:7px;font-size:13px}
/* Settings page */
.settings-page{flex:1;overflow-y:auto;padding:20px}
.settings-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:20px;max-width:500px}
.settings-card h2{font-size:15px;margin-bottom:14px;color:#333}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.field input{width:100%;padding:8px 11px;border:1px solid #DDD;border-radius:7px;font-size:13px}
.field input:focus{outline:none;border-color:#1976D2}
/* Undo indicator */
.undo-badge{background:rgba(255,255,255,.15);color:#fff;padding:3px 9px;border-radius:10px;font-size:11px}
/* Notifications */
#notif{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.notif-item{background:#323232;color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;box-shadow:0 3px 12px rgba(0,0,0,.3);animation:slidein .25s ease;pointer-events:auto}
.notif-item.ok{background:#2E7D32}
.notif-item.err{background:#B71C1C}
@keyframes slidein{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
/* month modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
</style>
</head>
<body>

<header>
  <h1>⚙️ 排班管理</h1>
  <div class="tabs">
    <button class="active" onclick="switchTab('schedule')">📅 排班</button>
    <button onclick="switchTab('staff')">👥 員工</button>
    <button onclick="switchTab('settings')">⚙️ 設定</button>
  </div>
  <div class="hright">
    <button class="btn btn-ghost" id="undoBtn" onclick="undo()" disabled title="還原">↩ 還原</button>
    <span class="undo-badge" id="histBadge">0/10</span>
    <a href="index.html" class="btn btn-ghost" target="_blank">👁 員工視圖</a>
    <button class="btn btn-primary" id="publishBtn" onclick="publish()">🚀 發布班表</button>
  </div>
</header>

<!-- Month lock banner -->
<div id="lockBanner">🔒 此月份已過期，無法再修改（次月1日起自動鎖定）</div>

<!-- ── Schedule Page ── -->
<div id="tab-schedule" class="page active schedule-page">
  <div class="toolbar">
    <select id="monthSel" onchange="onMonthChange()"></select>
    <button class="btn btn-ghost" onclick="showNewMonthModal()">＋ 新月份</button>
    <button class="btn btn-ghost" onclick="copyPrevMonth()">📋 複製上月</button>
    <div class="tool-sep"></div>
    <button class="btn btn-warn" onclick="autoSchedule()">🎲 自動排班</button>
    <button class="btn btn-ghost" onclick="clearAll()">🗑 清除未鎖定</button>
    <div class="tool-sep"></div>
    <span style="font-size:12px;color:#888">點擊格子選班別・已手動設定的格子顯示🔒・可拖拉互換</span>
  </div>
  <div class="main-area">
    <div class="grid-area"><table class="sched" id="schedTable"></table></div>
    <div class="sidebar">
      <div class="s-section">
        <div class="s-head">⚠ 違規與注意事項 <span id="vioCount" style="font-size:11px;color:#888"></span></div>
        <div class="s-body"><div class="vio-list" id="vioList"></div></div>
      </div>
      <div class="s-section">
        <div class="s-head">🔄 調班申請 <button class="vio-btn" onclick="openSwapForm()" style="font-size:11px">＋ 新增</button></div>
        <div class="s-body"><div id="swapList"><div style="color:#AAA;font-size:12px">無申請中的調班</div></div></div>
      </div>
      <div class="s-section">
        <div class="s-head">📊 班別統計</div>
        <div class="s-body"><div id="statsBox" style="font-size:12px"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Staff Page ── -->
<div id="tab-staff" class="page">
  <div class="staff-page">
    <div class="staff-card">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:14px">員工名單</h2>
      <div id="staffList"></div>
      <div class="staff-form" style="margin-top:14px;border-top:1px solid #EEE;padding-top:14px">
        <input id="newName" placeholder="姓名" maxlength="20">
        <select id="newType"><option value="FT">正職 FT</option><option value="PT">兼職 PT</option></select>
        <button class="btn btn-primary" onclick="addStaff()">＋ 新增</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Settings Page ── -->
<div id="tab-settings" class="page">
  <div class="settings-page">
    <div class="settings-card">
      <h2>GitHub 設定</h2>
      <div class="field">
        <label>GitHub Personal Access Token (PAT)</label>
        <input type="password" id="patInput" placeholder="ghp_xxxxxxxxxxxx" value="">
        <div style="font-size:11px;color:#999;margin-top:4px">儲存在本機，不會上傳到任何地方。需要 repo 讀寫權限。</div>
      </div>
      <div class="field">
        <label>GitHub Repo</label>
        <input id="repoInput" value="VitoKOK-lab/gloria-schedule">
      </div>
      <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:4px">💾 儲存設定</button>
    </div>
  </div>
</div>

<!-- Shift picker popup -->
<div id="picker">
  <div class="picker-name" id="pickerTitle"></div>
  <div class="picker-grid">
    <button class="popt A" onclick="pickShift('A')">A 早班</button>
    <button class="popt M" onclick="pickShift('M')">M 中班</button>
    <button class="popt P" onclick="pickShift('P')">P 晚班</button>
    <button class="popt RL" onclick="pickShift('RL')">RL 例假</button>
    <button class="popt AL" onclick="pickShift('AL')">AL 年假</button>
    <button class="popt SL" onclick="pickShift('SL')">SL 病假</button>
    <button class="popt OL" onclick="pickShift('OL')">OL 公假</button>
    <button class="popt 生理假" onclick="pickShift('生理假')">生理假</button>
    <button class="popt clear" onclick="pickShift('')">— 清除</button>
    <button class="popt unlock" id="unlockBtn" onclick="toggleLock()">🔒 解鎖此格</button>
  </div>
  <div class="picker-actions">
    <button onclick="closePicker()" style="background:#EEE;color:#555">關閉</button>
  </div>
</div>

<!-- Swap request form modal -->
<div class="modal-bg" id="swapModal">
  <div class="modal">
    <h3>🔄 新增調班申請</h3>
    <div class="field"><label>員工</label>
      <select id="swapStaff" style="width:100%;padding:7px 10px;border:1px solid #DDD;border-radius:7px;font-size:13px"></select></div>
    <div class="field"><label>日期</label>
      <select id="swapDay" style="width:100%;padding:7px 10px;border:1px solid #DDD;border-radius:7px;font-size:13px"></select></div>
    <div class="field"><label>希望改為</label>
      <select id="swapTo" style="width:100%;padding:7px 10px;border:1px solid #DDD;border-radius:7px;font-size:13px">
        <option value="A">A 早班</option><option value="M">M 中班</option>
        <option value="P">P 晚班</option><option value="RL">RL 例假</option>
        <option value="AL">AL 年假</option><option value="SL">SL 病假</option>
      </select></div>
    <div class="field"><label>備註（原因）</label>
      <input id="swapNote" placeholder="例如：家庭因素，希望換班"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSwapModal()">取消</button>
      <button class="btn btn-warn" onclick="submitSwapRequest()">提交申請</button>
    </div>
  </div>
</div>

<!-- New month modal -->
<div class="modal-bg" id="monthModal">
  <div class="modal">
    <h3>新增月份</h3>
    <div class="field"><label>年月（格式 YYYY-MM）</label>
      <input id="newMonthInput" placeholder="2026-05"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeMonthModal()">取消</button>
      <button class="btn btn-primary" onclick="createNewMonth()">建立</button>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
// ═══════════════════════════════════════════
//  Constants & State
// ═══════════════════════════════════════════
const DOW_ZH={Mon:'一',Tue:'二',Wed:'三',Thu:'四',Fri:'五',Sat:'六',Sun:'日'};

// ── Swap requests ──
ST.swapRequests=[];

function openSwapForm(){
  if(isMonthLocked(ST.currentMonth)){notify('此月份已鎖定，無法新增申請','err');return;}
  const ss=document.getElementById('swapStaff');
  ss.innerHTML=ST.staff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const sd=document.getElementById('swapDay');
  sd.innerHTML=ST.days.map((d,i)=>`<option value="${i}">${d}日（${DOW_ZH[ST.daysOfWeek[i]]}）</option>`).join('');
  document.getElementById('swapNote').value='';
  document.getElementById('swapModal').classList.add('show');
}
function closeSwapModal(){document.getElementById('swapModal').classList.remove('show');}
function submitSwapRequest(){
  const staffId=document.getElementById('swapStaff').value;
  const dayIdx=parseInt(document.getElementById('swapDay').value);
  const toShift=document.getElementById('swapTo').value;
  const note=document.getElementById('swapNote').value.trim();
  const s=ST.staff.find(x=>x.id===staffId);
  const fromShift=(ST.draft[staffId]||[])[dayIdx]||'—';
  ST.swapRequests.push({staffId,dayIdx,fromShift,toShift,note,status:'pending',id:Date.now()});
  closeSwapModal();
  renderGrid();renderSwapPanel();
  notify(`已記錄 ${s.name} 的調班申請`);
}
function approveSwap(reqId){
  const req=ST.swapRequests.find(r=>r.id===reqId);
  if(!req) return;
  pushHistory();
  setShift(req.staffId,req.dayIdx,req.toShift,true);
  req.status='approved';
  renderGrid();renderViolations();renderStats();renderSwapPanel();
  notify('調班已核准並套用到班表');
}
function rejectSwap(reqId){
  const req=ST.swapRequests.find(r=>r.id===reqId);
  if(!req) return;
  req.status='rejected';
  renderSwapPanel();
  notify('調班申請已拒絕');
}
function renderSwapPanel(){
  const pending=ST.swapRequests.filter(r=>r.status==='pending');
  const el=document.getElementById('swapList');
  if(!pending.length){el.innerHTML='<div style="color:#AAA;font-size:12px">無申請中的調班</div>';return;}
  el.innerHTML=pending.map(r=>{
    const s=ST.staff.find(x=>x.id===r.staffId);
    return `<div class="swap-item">
      <div class="sw-head">
        <span class="swap-badge">申請中</span>
        <span style="font-weight:600">${s?.name||r.staffId}</span>
        <span style="color:#888">${ST.days[r.dayIdx]}日（${DOW_ZH[ST.daysOfWeek[r.dayIdx]]}）</span>
      </div>
      <div>${r.fromShift} → <b>${r.toShift}</b>${r.note?`<br><span style="color:#888">${r.note}</span>`:''}</div>
      <div class="sw-actions">
        <button class="sw-accept" onclick="approveSwap(${r.id})">✓ 核准</button>
        <button class="sw-reject" onclick="rejectSwap(${r.id})">✕ 拒絕</button>
      </div>
    </div>`;
  }).join('');
}

// ── Month lock ──
function isMonthLocked(month){
  if(!month) return false;
  const [y,m]=month.split('-').map(Number);
  // Locked when today >= 1st of next month
  return new Date()>=new Date(y,m,1); // JS: month m = m+1 since 0-indexed
}
function updateLockUI(){
  const locked=isMonthLocked(ST.currentMonth);
  document.getElementById('lockBanner').style.display=locked?'block':'none';
  const editBtns=['undoBtn','publishBtn'];
  editBtns.forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=locked;});
  // Toolbar buttons
  document.querySelectorAll('.toolbar .btn').forEach(b=>b.disabled=locked);
}
const OFF_SET=new Set(['RL','RL/','RL-','AL','SL','ML','BL','OL','PL','FL','WL','生理假']);
function isOff(x){return !x||OFF_SET.has(x)||x.startsWith('RL')}
function isWork(x){return x&&!isOff(x)}

const ST={
  currentMonth:null,
  months:[],
  staff:[],
  rules:{},
  daysOfWeek:[],
  days:[],
  draft:{},       // staffId->[shift|null,...] null=unlocked+unset
  locked:{},      // staffId->Set<dayIdx>
  history:[],     // for undo
  dirty:false,
};

// picker state
let pickerStaff=null, pickerDay=null;

// drag state
let dragStaff=null, dragDay=null;

// ═══════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════
async function init(){
  loadSettings();
  try{
    const sd=await fetch('data/staff.json').then(r=>r.json());
    ST.staff=[...sd.staff];
    ST.rules=sd.rules;
  } catch(e){ notify('無法載入員工資料','err'); return; }
  try{
    const idx=await fetch('data/months.json').then(r=>r.json());
    ST.months=[...idx.months];
  } catch(e){ ST.months=['2026-04']; }
  buildMonthSelect();
  const sel=document.getElementById('monthSel');
  sel.value=ST.months[ST.months.length-1];
  await loadMonth(sel.value);
  renderStaff();
}

function buildMonthSelect(){
  const sel=document.getElementById('monthSel');
  sel.innerHTML='';
  for(const m of ST.months){
    const o=document.createElement('option');
    o.value=m;o.textContent=m;
    sel.appendChild(o);
  }
}

async function onMonthChange(){
  const m=document.getElementById('monthSel').value;
  await loadMonth(m);
}

async function loadMonth(month){
  ST.currentMonth=month;
  ST.draft={};ST.locked={};ST.history=[];ST.swapRequests=[];
  updateHistBadge();
  updateLockUI();
  try{
    const sc=await fetch(`data/schedule_${month.replace('-','_')}.json?t=${Date.now()}`).then(r=>r.json());
    ST.daysOfWeek=sc.daysOfWeek;
    ST.days=sc.days;
    for(const name of sc.staff){
      ST.draft[name]=[...(sc.schedules[name]||[])];
      ST.locked[name]=new Set();
    }
    ST.swapRequests=sc.swapRequests||[];
    renderSwapPanel();
    // also init for any staff not in file
    for(const s of ST.staff){
      if(!ST.draft[s.id]){
        ST.draft[s.id]=new Array(ST.days.length).fill(null);
        ST.locked[s.id]=new Set();
      }
    }
  } catch(e){
    // new/empty month – build from calendar
    const [y,mo]=month.split('-').map(Number);
    const daysInMonth=new Date(y,mo,0).getDate();
    ST.days=Array.from({length:daysInMonth},(_,i)=>i+1);
    ST.daysOfWeek=buildDOW(y,mo,daysInMonth);
    for(const s of ST.staff){
      ST.draft[s.id]=new Array(daysInMonth).fill(null);
      ST.locked[s.id]=new Set();
    }
  }
  renderGrid();
  renderViolations();
  renderStats();
}

function buildDOW(y,mo,days){
  const names=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return Array.from({length:days},(_,i)=>{
    const d=new Date(y,mo-1,i+1);
    return names[d.getDay()];
  });
}

function getDayType(dow){
  if(dow==='Sat'||dow==='Sun') return 'weekend';
  if(dow==='Fri') return 'friday';
  return 'weekday';
}

// ═══════════════════════════════════════════
//  History / Undo
// ═══════════════════════════════════════════
function pushHistory(){
  const snap={draft:deepClone(ST.draft),locked:{}};
  for(const k in ST.locked) snap.locked[k]=new Set(ST.locked[k]);
  ST.history.push(snap);
  if(ST.history.length>10) ST.history.shift();
  updateHistBadge();
}
function undo(){
  if(!ST.history.length) return;
  const snap=ST.history.pop();
  ST.draft=snap.draft;
  ST.locked=snap.locked;
  updateHistBadge();
  renderGrid();renderViolations();renderStats();
  notify('已還原');
}
function updateHistBadge(){
  document.getElementById('histBadge').textContent=`${ST.history.length}/10`;
  document.getElementById('undoBtn').disabled=ST.history.length===0;
}
function deepClone(o){return JSON.parse(JSON.stringify(o))}

// ═══════════════════════════════════════════
//  Grid Rendering
// ═══════════════════════════════════════════
function renderGrid(){
  if(!ST.days.length) return;
  const req=ST.rules.staffingRequirements||{weekday:{A:1,M:0,P:3},friday:{A:1,M:1,P:3},weekend:{A:1,M:1,P:3}};
  const vioSet=buildVioSet();
  const ftStaff=ST.staff.filter(s=>s.type==='FT');

  let h='<thead><tr><th class="sticky-name">姓名</th>';
  for(let i=0;i<ST.days.length;i++){
    const dow=ST.daysOfWeek[i];
    const dt=getDayType(dow);
    h+=`<th class="${dt==='weekend'?'wknd':dt==='friday'?'fri':''}">
      <div class="dh-d">${ST.days[i]}</div><div class="dh-w">${DOW_ZH[dow]||dow}</div></th>`;
  }
  h+='<th>早</th><th>中</th><th>晚</th><th>休</th></tr></thead><tbody>';

  for(const s of ST.staff){
    const sc=ST.draft[s.id]||[];
    const lk=ST.locked[s.id]||new Set();
    h+=`<tr><td class="sticky-name">${s.name}${s.type==='PT'?'<span style="font-size:9px;color:#F57C00;margin-left:3px">PT</span>':''}</td>`;
    let A=0,M=0,P=0,off=0;
    for(let i=0;i<ST.days.length;i++){
      const sh=sc[i]||'';
      const dt=getDayType(ST.daysOfWeek[i]);
      const isLocked=lk.has(i);
      const vio=vioSet[s.id]&&vioSet[s.id].has(i);
      const hasSwap=ST.swapRequests.some(r=>r.staffId===s.id&&r.dayIdx===i&&r.status==='pending');
      if(sh==='A')A++;else if(sh==='M')M++;else if(sh==='P')P++;
      if(isOff(sh)&&sh)off++;
      const cls=[sh||'empty',isLocked?'locked':'',vio?'vio':'',hasSwap?'swap-req':''].filter(Boolean).join(' ');
      h+=`<td class="${dt==='weekend'?'wknd-bg':''}">
        <div class="cell ${cls}"
          draggable="true"
          data-staff="${s.id}" data-day="${i}"
          onclick="openPicker('${s.id}',${i},event)"
          ondragstart="onDragStart('${s.id}',${i},event)"
          ondragover="onDragOver(event)"
          ondrop="onDrop('${s.id}',${i},event)"
          ondragleave="onDragLeave(event)"
        >${sh||'—'}</div></td>`;
    }
    h+=`<td style="font-size:10px;color:var(--A);font-weight:700">${A}</td>
      <td style="font-size:10px;color:var(--M);font-weight:700">${M}</td>
      <td style="font-size:10px;color:var(--P);font-weight:700">${P}</td>
      <td style="font-size:10px;color:var(--RL);font-weight:700">${off}</td></tr>`;
  }

  // Staffing count rows
  for(const type of ['A','M','P']){
    h+=`<tr class="stat"><td class="sticky-name" style="font-size:10px;color:${type==='A'?'var(--A)':type==='M'?'var(--M)':'var(--P)'};padding:0 8px">${type==='A'?'早':type==='M'?'中':'晚'}班人數</td>`;
    for(let i=0;i<ST.days.length;i++){
      const dt=getDayType(ST.daysOfWeek[i]);
      const cnt=ST.staff.filter(s=>(ST.draft[s.id]||[])[i]===type).length;
      const need=(req[dt]||{})[type]||0;
      h+=`<td class="${dt==='weekend'?'wknd-bg':''}${need>0&&cnt<need?' warn':''}" style="height:18px">${cnt}</td>`;
    }
    h+='<td colspan="4"></td></tr>';
  }
  h+='</tbody>';
  document.getElementById('schedTable').innerHTML=h;
}

// ═══════════════════════════════════════════
//  Violations
// ═══════════════════════════════════════════
function buildVioSet(){
  const viols=computeViolations();
  const set={};
  for(const v of viols){
    if(v.cells){
      for(const {staff,day} of v.cells){
        if(!set[staff])set[staff]=new Set();
        set[staff].add(day);
      }
    }
  }
  return set;
}

function computeViolations(){
  const viols=[];
  const rules=ST.rules;
  const req=rules.staffingRequirements||{weekday:{A:1,M:0,P:3},friday:{A:1,M:1,P:3},weekend:{A:1,M:1,P:3}};
  const ftStaff=ST.staff.filter(s=>s.type==='FT');

  // 1. Consecutive work days
  for(const s of ftStaff){
    const sc=ST.draft[s.id]||[];
    let streak=0,start=0;
    for(let i=0;i<=sc.length;i++){
      const w=i<sc.length&&isWork(sc[i]);
      if(w){if(streak===0)start=i;streak++;}
      else{
        if(streak>(rules.maxConsecutiveWorkDays||4)){
          const cells=Array.from({length:streak},(_,k)=>({staff:s.id,day:start+k}));
          viols.push({type:'error',code:'consec',msg:`${s.name} 連續上班 ${streak} 天（${ST.days[start]}-${ST.days[start+streak-1]}日）`,cells,meta:{staff:s.id,start,streak}});
        }
        streak=0;
      }
    }
  }

  // 2. Co-rest trio
  const trio=rules.noSimultaneousOff||[];
  for(let i=0;i<ST.days.length;i++){
    const off=trio.filter(n=>{const s=ST.staff.find(x=>x.id===n||x.name===n);if(!s)return false;return isOff((ST.draft[s.id]||[])[i]);});
    if(off.length>=3){
      const cells=off.map(n=>{const s=ST.staff.find(x=>x.id===n||x.name===n);return{staff:s.id,day:i};});
      viols.push({type:'error',code:'trio',msg:`${ST.days[i]}日：${off.join('+')} 三人同休`,cells,meta:{day:i,names:off}});
    } else if(off.length===2){
      const cells=off.map(n=>{const s=ST.staff.find(x=>x.id===n||x.name===n);return{staff:s.id,day:i};});
      viols.push({type:'warn',code:'pair',msg:`${ST.days[i]}日：${off.join('+')} 同休`,cells,meta:{day:i,names:off}});
    }
  }

  // 3. Understaffed days
  for(let i=0;i<ST.days.length;i++){
    const dt=getDayType(ST.daysOfWeek[i]);
    const r=req[dt]||{};
    for(const type of ['A','M','P']){
      const need=r[type]||0;if(!need)continue;
      const cnt=ST.staff.filter(s=>(ST.draft[s.id]||[])[i]===type).length;
      if(cnt<need){
        viols.push({type:'warn',code:'understaff',msg:`${ST.days[i]}日（${DOW_ZH[ST.daysOfWeek[i]]}）${type==='A'?'早':type==='M'?'中':'晚'}班人數不足（${cnt}/${need}）`,meta:{day:i,shiftType:type,need,have:cnt}});
      }
    }
  }

  // 4. Early shift imbalance
  const aCnts={};
  for(const s of ftStaff) aCnts[s.id]=(ST.draft[s.id]||[]).filter(x=>x==='A').length;
  const vals=Object.values(aCnts);
  if(vals.length>1){
    const mx=Math.max(...vals),mn=Math.min(...vals);
    if(mx-mn>(rules.earlyShiftBalanceTolerance||1)+1){
      const max_names=ftStaff.filter(s=>aCnts[s.id]===mx).map(s=>s.name).join(',');
      const min_names=ftStaff.filter(s=>aCnts[s.id]===mn).map(s=>s.name).join(',');
      viols.push({type:'warn',code:'a_imbalance',msg:`早班分配不均：${max_names}(${mx}次) vs ${min_names}(${mn}次)，差 ${mx-mn}`,meta:{max:mx,min:mn,maxNames:max_names,minNames:min_names}});
    }
  }

  // 5. Days off count
  for(const s of ftStaff){
    const off=(ST.draft[s.id]||[]).filter(x=>isOff(x)&&x).length;
    const {min=10,max=11}=rules.daysOffPerMonth||{};
    if(off<min||off>max){
      viols.push({type:'warn',code:'days_off',msg:`${s.name} 休假 ${off} 天（應 ${min}-${max} 天）`,meta:{staff:s.id,off,min,max}});
    }
  }

  return viols;
}

function renderViolations(){
  const viols=computeViolations();
  const errors=viols.filter(v=>v.type==='error').length;
  const warns=viols.filter(v=>v.type==='warn').length;
  document.getElementById('vioCount').textContent=`${errors}錯 ${warns}警`;
  const el=document.getElementById('vioList');
  if(!viols.length){el.innerHTML='<div style="color:#4CAF50;font-size:12px;padding:4px 0">✅ 本月無違規</div>';return;}
  el.innerHTML=viols.map((v,idx)=>`
    <div class="vio-item" id="vitem${idx}">
      <div class="vio-main">
        <span class="vio-badge ${v.type}">${v.type==='error'?'❌':'⚠'}</span>
        <span class="vio-msg">${v.msg}</span>
        <button class="vio-btn" onclick="showSuggestion(${idx})">修正建議</button>
      </div>
      <div class="suggestion-box" id="sug${idx}" style="display:none"></div>
    </div>`).join('');
  // store viols for later access
  window._viols=viols;
}

function showSuggestion(idx){
  const v=window._viols[idx];
  const box=document.getElementById(`sug${idx}`);
  if(box.style.display==='block'){box.style.display='none';return;}
  const sug=generateSuggestion(v);
  box.innerHTML=`<div class="sug-title">💡 修正建議</div>
    <div class="sug-detail">${sug.text}</div>
    <div class="sug-actions">
      <button class="sug-accept" onclick="applySuggestion(${idx})">✓ 接受</button>
      <button class="sug-close" onclick="document.getElementById('sug${idx}').style.display='none'">✕ 關閉</button>
    </div>`;
  box.style.display='block';
  window._viols[idx]._sug=sug;
}

function generateSuggestion(v){
  const ftStaff=ST.staff.filter(s=>s.type==='FT');
  switch(v.code){
    case 'consec':{
      const {staff,start,streak}=v.meta;
      // Find a middle day to give off, try to find someone to cover
      const midDay=start+Math.floor(streak/2);
      const s=ST.staff.find(x=>x.id===staff);
      return {
        text:`建議給 <b>${s.name}</b> 在 <b>${ST.days[midDay]}日</b> 安排休假，將連續工作拆成兩段。`,
        apply:()=>{
          setShift(staff,midDay,'RL',true);
        }
      };
    }
    case 'trio':{
      const {day,names}=v.meta;
      // Move one person's rest to adjacent day
      const tgt=names[names.length-1];
      const s=ST.staff.find(x=>x.id===tgt||x.name===tgt);
      const altDay=day+1<ST.days.length?day+1:day-1;
      return {
        text:`建議將 <b>${tgt}</b> 的 ${ST.days[day]}日 休假移至 <b>${ST.days[altDay]}日</b>，讓 ${names.slice(0,-1).join('+')} 不會三人同休。`,
        apply:()=>{
          setShift(s.id,day,'P',true);
          setShift(s.id,altDay,'RL',true);
        }
      };
    }
    case 'pair':{
      const {day,names}=v.meta;
      const tgt=names[1];
      const s=ST.staff.find(x=>x.id===tgt||x.name===tgt);
      if(!s) return {text:'無法自動建議，請手動調整。',apply:null};
      const altDay=day+1<ST.days.length?day+1:day-1;
      return {
        text:`建議將 <b>${tgt}</b> 的 ${ST.days[day]}日 休假移至 <b>${ST.days[altDay]}日</b>。`,
        apply:()=>{
          setShift(s.id,day,'P',true);
          setShift(s.id,altDay,'RL',true);
        }
      };
    }
    case 'understaff':{
      const {day,shiftType,need,have}=v.meta;
      // Find staff on RL or other shift who can be moved
      const candidates=ftStaff.filter(s=>{
        const sh=(ST.draft[s.id]||[])[day];
        return sh&&sh!==shiftType&&!ST.locked[s.id]?.has(day);
      });
      if(!candidates.length) return {text:'當日無可調整的員工（皆已鎖定），請手動調整。',apply:null};
      const pick=candidates[0];
      const oldSh=(ST.draft[pick.id]||[])[day];
      return {
        text:`建議將 <b>${pick.name}</b> 在 <b>${ST.days[day]}日</b> 的班別從 ${oldSh||'空'} 改為 <b>${shiftType}</b>。`,
        apply:()=>{ setShift(pick.id,day,shiftType,true); }
      };
    }
    case 'a_imbalance':{
      const {maxNames,minNames}=v.meta;
      const maxS=ftStaff.find(s=>s.name===maxNames.split(',')[0]);
      const minS=ftStaff.find(s=>s.name===minNames.split(',')[0]);
      if(!maxS||!minS) return {text:'請手動調整早班分配。',apply:null};
      // Find a day where maxS has A and minS has P/M, swap
      for(let i=0;i<ST.days.length;i++){
        if((ST.draft[maxS.id]||[])[i]==='A'&&!ST.locked[maxS.id]?.has(i)
          && isWork((ST.draft[minS.id]||[])[i])&&!ST.locked[minS.id]?.has(i)){
          const minSh=(ST.draft[minS.id]||[])[i];
          return {
            text:`建議將 ${ST.days[i]}日 <b>${maxS.name}</b> 的早班 A 與 <b>${minS.name}</b> 的 ${minSh} 互換。`,
            apply:()=>{ setShift(maxS.id,i,minSh,true);setShift(minS.id,i,'A',true); }
          };
        }
      }
      return {text:'請手動調整早班分配。',apply:null};
    }
    case 'days_off':{
      const {staff,off,min,max}=v.meta;
      const s=ST.staff.find(x=>x.id===staff);
      if(off>max){
        // Find a RL day to convert to work
        for(let i=0;i<ST.days.length;i++){
          if((ST.draft[staff]||[])[i]==='RL'&&!ST.locked[staff]?.has(i)){
            return {text:`建議將 ${s.name} 的 ${ST.days[i]}日 休假改為晚班 P（休假天數將從 ${off} 變為 ${off-1}）。`,
              apply:()=>setShift(staff,i,'P',false)};
          }
        }
      } else {
        // Find a work day to convert to RL
        for(let i=0;i<ST.days.length;i++){
          const sh=(ST.draft[staff]||[])[i];
          if(isWork(sh)&&!ST.locked[staff]?.has(i)){
            return {text:`建議將 ${s.name} 的 ${ST.days[i]}日 改為休假 RL（休假天數將從 ${off} 變為 ${off+1}）。`,
              apply:()=>setShift(staff,i,'RL',false)};
          }
        }
      }
      return {text:'請手動調整休假天數。',apply:null};
    }
    default: return {text:'請手動調整。',apply:null};
  }
}

function applySuggestion(idx){
  const v=window._viols[idx];
  if(!v._sug||!v._sug.apply){notify('此項目無法自動修正，請手動調整','err');return;}
  pushHistory();
  v._sug.apply();
  renderGrid();renderViolations();renderStats();
  notify('已套用建議');
  document.getElementById(`sug${idx}`).style.display='none';
}

// ═══════════════════════════════════════════
//  Stats
// ═══════════════════════════════════════════
function renderStats(){
  const ftStaff=ST.staff.filter(s=>s.type==='FT');
  let h='<table style="width:100%;border-collapse:collapse;font-size:11px"><tr><th style="text-align:left;padding:3px 0;color:#555">姓名</th><th style="color:var(--A)">A早</th><th style="color:var(--M)">M中</th><th style="color:var(--P)">P晚</th><th style="color:var(--RL)">休</th></tr>';
  for(const s of ST.staff){
    const sc=ST.draft[s.id]||[];
    const A=sc.filter(x=>x==='A').length;
    const M=sc.filter(x=>x==='M').length;
    const P=sc.filter(x=>x==='P').length;
    const off=sc.filter(x=>isOff(x)&&x).length;
    h+=`<tr><td style="padding:3px 0;font-weight:600">${s.name}</td><td>${A}</td><td>${M}</td><td>${P}</td><td>${off}</td></tr>`;
  }
  h+='</table>';
  document.getElementById('statsBox').innerHTML=h;
}

// ═══════════════════════════════════════════
//  Shift Picker
// ═══════════════════════════════════════════
function openPicker(staffId,dayIdx,e){
  e.stopPropagation();
  pickerStaff=staffId;pickerDay=dayIdx;
  const s=ST.staff.find(x=>x.id===staffId);
  const sh=(ST.draft[staffId]||[])[dayIdx]||'';
  const isLocked=ST.locked[staffId]?.has(dayIdx);
  document.getElementById('pickerTitle').textContent=`${s.name} · ${ST.days[dayIdx]}日（${DOW_ZH[ST.daysOfWeek[dayIdx]]}）`;
  document.getElementById('unlockBtn').textContent=isLocked?'🔓 解鎖此格':'🔒 鎖定此格';
  const pk=document.getElementById('picker');
  pk.classList.add('show');
  // position near click
  const x=Math.min(e.clientX,window.innerWidth-280);
  const y=Math.min(e.clientY+8,window.innerHeight-200);
  pk.style.left=x+'px';pk.style.top=y+'px';
}
function closePicker(){pickerStaff=null;pickerDay=null;document.getElementById('picker').classList.remove('show');}
function pickShift(sh){
  if(pickerStaff===null) return;
  pushHistory();
  setShift(pickerStaff,pickerDay,sh,true);
  closePicker();
  renderGrid();renderViolations();renderStats();
}
function toggleLock(){
  if(pickerStaff===null) return;
  const lk=ST.locked[pickerStaff];
  if(lk.has(pickerDay)) lk.delete(pickerDay); else lk.add(pickerDay);
  closePicker();
  renderGrid();
}
function setShift(staffId,dayIdx,sh,lock){
  if(!ST.draft[staffId]) ST.draft[staffId]=new Array(ST.days.length).fill(null);
  ST.draft[staffId][dayIdx]=sh||null;
  if(lock&&sh) ST.locked[staffId].add(dayIdx);
  ST.dirty=true;
}

// ═══════════════════════════════════════════
//  Drag & Drop
// ═══════════════════════════════════════════
function onDragStart(staff,day,e){
  dragStaff=staff;dragDay=day;
  e.dataTransfer.effectAllowed='move';
}
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function onDrop(staff,day,e){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragStaff===null||dragStaff===staff&&dragDay===day){dragStaff=null;return;}
  pushHistory();
  const sh1=(ST.draft[dragStaff]||[])[dragDay];
  const sh2=(ST.draft[staff]||[])[day];
  setShift(dragStaff,dragDay,sh2||null,true);
  setShift(staff,day,sh1||null,true);
  dragStaff=null;
  renderGrid();renderViolations();renderStats();
}

// ═══════════════════════════════════════════
//  Auto Scheduler
// ═══════════════════════════════════════════
function autoSchedule(){
  if(!ST.days.length){notify('請先選擇月份','err');return;}
  pushHistory();
  const ftStaff=ST.staff.filter(s=>s.type==='FT');
  const rules=ST.rules;
  const n=ST.days.length;
  const req=rules.staffingRequirements||{weekday:{A:1,M:0,P:3},friday:{A:1,M:1,P:3},weekend:{A:1,M:1,P:3}};
  const noCoOff=rules.noSimultaneousOff||[];

  // Resolve trio staff ids
  const trioIds=noCoOff.map(name=>{const s=ST.staff.find(x=>x.id===name||x.name===name);return s?s.id:null;}).filter(Boolean);

  // Build schedule starting from locked values
  const sched={};
  for(const s of ftStaff){
    sched[s.id]=Array.from({length:n},(_,i)=>ST.locked[s.id]?.has(i)?(ST.draft[s.id]||[])[i]||null:null);
  }

  // Phase 1: assign off days
  const TARGET_OFF=rules.daysOffPerMonth?.min||10;
  const shuffled=shuffle([...ftStaff]);
  for(const s of shuffled){
    const sc=sched[s.id];
    const alreadyOff=sc.filter(x=>x&&isOff(x)).length;
    const need=Math.max(0,TARGET_OFF-alreadyOff);
    const available=[];
    for(let d=0;d<n;d++) if(sc[d]===null) available.push(d);
    const chosen=pickOffDays(s.id,available,need,sched,trioIds,n);
    for(const d of chosen) sched[s.id][d]='RL';
    for(let d=0;d<n;d++) if(sched[s.id][d]===null) sched[s.id][d]='__W';
  }

  // Phase 2: assign shift types day by day
  for(let d=0;d<n;d++){
    const dt=getDayType(ST.daysOfWeek[d]);
    const r=req[dt]||{A:1,M:0,P:3};
    const working=shuffled.filter(s=>sched[s.id][d]==='__W');
    const lockedA=ftStaff.filter(s=>sched[s.id][d]==='A').length;
    const lockedM=ftStaff.filter(s=>sched[s.id][d]==='M').length;
    const needA=Math.max(0,(r.A||0)-lockedA);
    const needM=Math.max(0,(r.M||0)-lockedM);
    // sort by early shift count asc (balance early shifts)
    working.sort((a,b)=>{
      const ca=sched[a.id].filter(x=>x==='A').length;
      const cb=sched[b.id].filter(x=>x==='A').length;
      return ca-cb+(Math.random()-.5)*.5;
    });
    let idx=0;
    for(let i=0;i<needA&&idx<working.length;i++,idx++) sched[working[idx].id][d]='A';
    for(let i=0;i<needM&&idx<working.length;i++,idx++) sched[working[idx].id][d]='M';
    for(;idx<working.length;idx++) sched[working[idx].id][d]='P';
  }

  // Commit: only update unlocked cells
  for(const s of ftStaff){
    if(!ST.draft[s.id]) ST.draft[s.id]=new Array(n).fill(null);
    for(let d=0;d<n;d++){
      if(!ST.locked[s.id]?.has(d)){
        const v=sched[s.id][d];
        ST.draft[s.id][d]=(v==='__W'||v===null)?'P':v;
      }
    }
  }
  ST.dirty=true;
  renderGrid();renderViolations();renderStats();
  notify('自動排班完成，可繼續手動調整');
}

function pickOffDays(staffId,available,needed,sched,trioIds,n){
  // Score + greedy pick
  const temp=[...sched[staffId]];
  const picked=[];
  // shuffle for variety
  const avail=shuffle([...available]);
  for(const d of avail){
    if(picked.length>=needed) break;
    // Trio constraint
    if(trioIds.includes(staffId)){
      const others=trioIds.filter(x=>x!==staffId);
      const co=others.filter(x=>sched[x]&&sched[x][d]&&isOff(sched[x][d])).length;
      if(co>=2) continue; // would cause trio co-rest
    }
    // Consecutive constraint: mark tentatively off and check
    temp[d]='RL';
    if(!exceeds5Consec(temp)){
      picked.push(d);
    } else {
      temp[d]=null;
    }
  }
  // Fill remaining if not enough (relax constraints)
  if(picked.length<needed){
    for(const d of avail){
      if(picked.length>=needed) break;
      if(!picked.includes(d)) picked.push(d);
    }
  }
  return picked;
}

function exceeds5Consec(sc){
  let streak=0;
  for(const x of sc){
    if(x===null||x==='__W'||(x&&!isOff(x))){streak++;if(streak>4)return true;}
    else streak=0;
  }
  return false;
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function clearAll(){
  if(!confirm('清除所有未鎖定的格子？')) return;
  pushHistory();
  for(const s of ST.staff){
    const lk=ST.locked[s.id]||new Set();
    const sc=ST.draft[s.id]||[];
    for(let d=0;d<sc.length;d++) if(!lk.has(d)) sc[d]=null;
  }
  renderGrid();renderViolations();renderStats();
}

// ═══════════════════════════════════════════
//  Month Management
// ═══════════════════════════════════════════
function showNewMonthModal(){
  const [y,m]=ST.currentMonth?ST.currentMonth.split('-').map(Number):[2026,4];
  const next=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;
  document.getElementById('newMonthInput').value=next;
  document.getElementById('monthModal').classList.add('show');
}
function closeMonthModal(){document.getElementById('monthModal').classList.remove('show');}
async function createNewMonth(){
  const m=document.getElementById('newMonthInput').value.trim();
  if(!/^\d{4}-\d{2}$/.test(m)){notify('格式錯誤，請輸入 YYYY-MM','err');return;}
  if(!ST.months.includes(m)) ST.months.push(m);
  buildMonthSelect();
  document.getElementById('monthSel').value=m;
  closeMonthModal();
  await loadMonth(m);
}

async function copyPrevMonth(){
  const idx=ST.months.indexOf(ST.currentMonth);
  if(idx<=0){notify('沒有上個月的資料','err');return;}
  const prev=ST.months[idx-1];
  try{
    const sc=await fetch(`data/schedule_${prev.replace('-','_')}.json`).then(r=>r.json());
    pushHistory();
    // Copy staff list, clear schedules
    for(const s of ST.staff){
      ST.draft[s.id]=new Array(ST.days.length).fill(null);
      ST.locked[s.id]=new Set();
    }
    notify(`已建立新月份，員工名單沿用上月。請按「自動排班」產生班表。`);
    renderGrid();renderViolations();renderStats();
  } catch(e){ notify('無法讀取上月資料','err'); }
}

// ═══════════════════════════════════════════
//  Staff Management
// ═══════════════════════════════════════════
function renderStaff(){
  const el=document.getElementById('staffList');
  el.innerHTML=ST.staff.map((s,i)=>`
    <div class="staff-row">
      <span class="staff-name">${s.name}</span>
      <span class="staff-type ${s.type}">${s.type==='FT'?'正職 FT':'兼職 PT'}</span>
      <button class="btn" style="background:#EEE;color:#555;padding:3px 10px;font-size:12px" onclick="toggleType(${i})">${s.type==='FT'?'改兼職':'改正職'}</button>
      <button class="btn" style="background:#FFEBEE;color:#D32F2F;padding:3px 10px;font-size:12px" onclick="removeStaff(${i})">移除</button>
    </div>`).join('');
}
function addStaff(){
  const name=document.getElementById('newName').value.trim();
  const type=document.getElementById('newType').value;
  if(!name){notify('請輸入姓名','err');return;}
  if(ST.staff.find(s=>s.name===name)){notify('姓名重複','err');return;}
  const id=name;
  ST.staff.push({id,name,type});
  ST.draft[id]=new Array(ST.days.length).fill(null);
  ST.locked[id]=new Set();
  document.getElementById('newName').value='';
  renderStaff();
  notify(`已新增 ${name}`);
}
function removeStaff(idx){
  const s=ST.staff[idx];
  if(!confirm(`確定移除 ${s.name}？`)) return;
  delete ST.draft[s.id];delete ST.locked[s.id];
  ST.staff.splice(idx,1);
  renderStaff();renderGrid();
}
function toggleType(idx){
  ST.staff[idx].type=ST.staff[idx].type==='FT'?'PT':'FT';
  renderStaff();
}

async function saveStaffToGithub(){
  const content={staff:ST.staff,rules:ST.rules};

}

// ═══════════════════════════════════════════
//  GitHub Publish
// ═══════════════════════════════════════════
function loadSettings(){
  const pat=localStorage.getItem('gloria_pat')||'';
  const repo=localStorage.getItem('gloria_repo')||'VitoKOK-lab/gloria-schedule';
  document.getElementById('patInput').value=pat;
  document.getElementById('repoInput').value=repo;
}
function saveSettings(){
  localStorage.setItem('gloria_pat',document.getElementById('patInput').value.trim());
  localStorage.setItem('gloria_repo',document.getElementById('repoInput').value.trim());
  notify('設定已儲存');
}
function getRepo(){return localStorage.getItem('gloria_repo')||'VitoKOK-lab/gloria-schedule';}
function getPAT(){return localStorage.getItem('gloria_pat')||'';}

async function githubGetSHA(path){
  const pat=getPAT();if(!pat) return null;
  try{
    const r=await fetch(`https://api.github.com/repos/${getRepo()}/contents/${path}`,
      {headers:{'Authorization':`token ${pat}`,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) return null;
    const j=await r.json();return j.sha||null;
  } catch(e){return null;}
}

async function githubPut(path,content,message){
  const pat=getPAT();
  if(!pat){notify('請先在設定頁面填入 GitHub Token','err');return false;}
  const sha=await githubGetSHA(path);
  const b64=btoa(unescape(encodeURIComponent(content)));
  const body={message,content:b64};
  if(sha) body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${getRepo()}/contents/${path}`,{
    method:'PUT',
    headers:{'Authorization':`token ${pat}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  return r.ok;
}

async function publish(){
  if(!ST.currentMonth){notify('請先選擇月份','err');return;}
  const pat=getPAT();
  if(!pat){notify('請先到「設定」頁面填入 GitHub Token','err');switchTab('settings');return;}
  document.getElementById('publishBtn').disabled=true;
  document.getElementById('publishBtn').textContent='發布中…';
  try{
    // Build schedule JSON
    const sc={
      month:ST.currentMonth,
      days:ST.days,
      daysOfWeek:ST.daysOfWeek,
      staff:ST.staff.map(s=>s.id),
      schedules:{},
      swapRequests:ST.swapRequests
    };
    for(const s of ST.staff) sc.schedules[s.id]=(ST.draft[s.id]||[]).map(x=>x||'');
    const path=`data/schedule_${ST.currentMonth.replace('-','_')}.json`;
    const ok1=await githubPut(path,JSON.stringify(sc,null,2),`更新 ${ST.currentMonth} 班表`);
    // Update months index
    const monthsJson=JSON.stringify({months:ST.months},null,2);
    const ok2=await githubPut('data/months.json',monthsJson,'更新月份索引');
    // Update staff
    const staffJson=JSON.stringify({staff:ST.staff,rules:ST.rules},null,2);
    const ok3=await githubPut('data/staff.json',staffJson,'更新員工資料');
    if(ok1&&ok2&&ok3){
      ST.dirty=false;
      notify('✅ 班表已發布到 GitHub！同事約 1 分鐘後可看到更新','ok');
    } else {
      notify('部分檔案發布失敗，請確認 Token 是否有 repo 權限','err');
    }
  } catch(e){
    notify('發布失敗：'+e.message,'err');
  }
  document.getElementById('publishBtn').disabled=false;
  document.getElementById('publishBtn').textContent='🚀 發布班表';
}

// ═══════════════════════════════════════════
//  UI Utilities
// ═══════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.tabs button').forEach((b,i)=>{
    b.classList.toggle('active',['schedule','staff','settings'][i]===tab);
  });
}
function notify(msg,type=''){
  const el=document.createElement('div');
  el.className='notif-item'+(type?' '+type:'');
  el.textContent=msg;
  document.getElementById('notif').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
document.addEventListener('click',e=>{
  if(!document.getElementById('picker').contains(e.target)) closePicker();
});

init();
</script>
