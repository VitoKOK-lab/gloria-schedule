<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloria 班表</title>
<style>
:root {
  --A:#388E3C; --A-bg:#E8F5E9;
  --M:#F57C00; --M-bg:#FFF3E0;
  --P:#1976D2; --P-bg:#E3F2FD;
  --RL:#757575; --RL-bg:#F5F5F5;
  --AL:#7B1FA2; --AL-bg:#F3E5F5;
  --SL:#D32F2F; --SL-bg:#FFEBEE;
  --OL:#455A64; --OL-bg:#ECEFF1;
  --SP:#C2185B; --SP-bg:#FCE4EC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#F0F2F5;min-height:100vh}
header{background:#1a1a2e;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.3)}
header h1{font-size:18px;font-weight:600;letter-spacing:.5px}
header .sub{font-size:12px;opacity:.6;margin-top:2px}
.month-bar{background:#fff;border-bottom:1px solid #E0E0E0;padding:10px 20px;display:flex;align-items:center;gap:10px}
.month-bar button{background:none;border:1px solid #CCC;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.month-bar button:hover{background:#F5F5F5}
.month-label{font-size:17px;font-weight:700;min-width:110px;text-align:center}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 20px;background:#fff;border-bottom:1px solid #EEE}
.litem{display:flex;align-items:center;gap:4px;font-size:12px;color:#555}
.ldot{width:11px;height:11px;border-radius:3px}
main{padding:16px 20px;overflow-x:auto}
.wrap{overflow-x:auto}
table{border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);min-width:860px;width:100%}
th{background:#1a1a2e;color:#fff;padding:8px 2px;font-size:11px;font-weight:500;text-align:center;position:sticky;top:0;z-index:2}
th.name{min-width:76px;position:sticky;left:0;z-index:3}
td{border:1px solid #EBEBEB;padding:0;text-align:center}
td.name{font-weight:600;font-size:13px;padding:0 8px;background:#FAFAFA;position:sticky;left:0;z-index:1;min-width:76px;border-right:2px solid #DDD;white-space:nowrap}
.dh-date{font-size:13px;font-weight:700}
.dh-dow{font-size:10px;opacity:.7}
th.wknd{background:#2a2a50}
th.fri{background:#1e3a5e}
.cell{height:34px;width:34px;min-width:34px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;margin:auto}
.cell.A{background:var(--A-bg);color:var(--A)}
.cell.M{background:var(--M-bg);color:var(--M)}
.cell.P{background:var(--P-bg);color:var(--P)}
.cell.RL,.cell.RL\/,.cell.RL-{background:var(--RL-bg);color:var(--RL)}
.cell.AL{background:var(--AL-bg);color:var(--AL)}
.cell.SL{background:var(--SL-bg);color:var(--SL)}
.cell.OL{background:var(--OL-bg);color:var(--OL)}
.cell.생리假,.cell.生理假{background:var(--SP-bg);color:var(--SP)}
.cell.empty{color:#CCC;font-size:11px}
.cell.swap-req{outline:2px dashed #FF6F00;outline-offset:-2px;border-radius:3px;position:relative}
.cell.swap-req::before{content:'申';position:absolute;top:1px;left:1px;font-size:7px;background:#FF6F00;color:#fff;border-radius:2px;padding:0 2px;font-weight:700}
td.wknd-col{background:#FFFDE7}
td.self A,.cell.self{outline:3px solid #FF9800;outline-offset:-3px;border-radius:3px}
.stat-row td{font-size:11px;height:20px;background:#F9F9F9}
.stat-row td.warn{color:#D32F2F;font-weight:700}
.empty-msg{text-align:center;padding:40px;color:#999;font-size:14px}
.person-filter{background:#fff;border-bottom:1px solid #EEE;padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.person-filter label{font-size:12px;color:#555}
.person-filter select{border:1px solid #DDD;padding:4px 8px;border-radius:6px;font-size:13px}
</style>
</head>
<body>
<header>
  <div>
    <div class="sub">Gloria Store</div>
    <h1>📅 班表</h1>
  </div>
</header>

<div class="person-filter">
  <label>我是：</label>
  <select id="selfSelect" onchange="renderSchedule()">
    <option value="">— 選擇姓名 —</option>
  </select>
  <span style="font-size:11px;color:#AAA;margin-left:8px">選擇姓名後會高亮顯示您的班次</span>
</div>

<div class="month-bar">
  <button onclick="prevMonth()">&#8249;</button>
  <span class="month-label" id="monthLabel">—</span>
  <button onclick="nextMonth()">&#8250;</button>
  <span id="loadStatus" style="font-size:12px;color:#AAA"></span>
</div>

<div class="legend">
  <div class="litem"><div class="ldot" style="background:var(--A)"></div>早班 A</div>
  <div class="litem"><div class="ldot" style="background:var(--M)"></div>中班 M</div>
  <div class="litem"><div class="ldot" style="background:var(--P)"></div>晚班 P</div>
  <div class="litem"><div class="ldot" style="background:var(--RL)"></div>例假 RL</div>
  <div class="litem"><div class="ldot" style="background:var(--AL)"></div>年假 AL</div>
  <div class="litem"><div class="ldot" style="background:var(--SL)"></div>病假 SL</div>
  <div class="litem"><div class="ldot" style="background:var(--OL)"></div>公假 OL</div>
  <div class="litem"><div class="ldot" style="background:var(--SP)"></div>生理假</div>
</div>

<main>
  <div class="wrap"><table id="tbl"></table></div>
</main>

<script>
const REPO = 'VitoKOK-lab/gloria-schedule';
const DOW_ZH = {Mon:'一',Tue:'二',Wed:'三',Thu:'四',Fri:'五',Sat:'六',Sun:'日'};
const OFF = new Set(['RL','RL/','RL-','AL','SL','ML','BL','OL','PL','FL','WL','生理假']);
function isOff(x){return OFF.has(x)||(!x)||x.startsWith('RL')}

let months=[], monthIdx=0, sched=null, staffData=null;

async function init(){
  try{
    staffData = await fetch('data/staff.json').then(r=>r.json());
    // populate self selector
    const sel = document.getElementById('selfSelect');
    const saved = localStorage.getItem('gloria_self')||'';
    for(const s of staffData.staff){
      const o=document.createElement('option');
      o.value=s.id; o.textContent=s.name;
      if(s.id===saved) o.selected=true;
      sel.appendChild(o);
    }
    // collect available months from index
    try{
      const idx = await fetch('data/months.json').then(r=>r.json());
      months = idx.months;
    } catch(e){ months=['2026-04']; }
    monthIdx = months.length-1;
    await loadMonth();
  } catch(e){ document.getElementById('tbl').innerHTML='<tr><td class="empty-msg">班表載入失敗</td></tr>'; }
}

async function loadMonth(){
  const m = months[monthIdx];
  document.getElementById('monthLabel').textContent = m;
  document.getElementById('loadStatus').textContent = '載入中…';
  try{
    sched = await fetch(`data/schedule_${m.replace('-','_')}.json?t=${Date.now()}`).then(r=>r.json());
    document.getElementById('loadStatus').textContent='';
    renderSchedule();
  } catch(e){
    sched=null;
    document.getElementById('loadStatus').textContent='⚠ 尚無資料';
    document.getElementById('tbl').innerHTML='<tr><td class="empty-msg">本月尚無班表</td></tr>';
  }
}

function prevMonth(){if(monthIdx>0){monthIdx--;loadMonth();}}
function nextMonth(){if(monthIdx<months.length-1){monthIdx++;loadMonth();}}

function getDayType(dow){
  if(dow==='Sat'||dow==='Sun') return 'weekend';
  if(dow==='Fri') return 'friday';
  return 'weekday';
}

function renderSchedule(){
  if(!sched) return;
  const self = document.getElementById('selfSelect').value;
  localStorage.setItem('gloria_self', self);
  const d = sched;
  const req = staffData.rules.staffingRequirements;
  let html='<thead><tr><th class="name">姓名</th>';
  for(let i=0;i<d.days.length;i++){
    const dow=d.daysOfWeek[i];
    const dt=getDayType(dow);
    html+=`<th class="${dt==='weekend'?'wknd':dt==='friday'?'fri':''}">
      <div class="dh-date">${d.days[i]}</div>
      <div class="dh-dow">${DOW_ZH[dow]||dow}</div>
    </th>`;
  }
  html+='<th>早</th><th>中</th><th>晚</th><th>休</th></thead><tbody>';

  for(const name of d.staff){
    const sc=d.schedules[name]||[];
    html+=`<tr><td class="name">${name}</td>`;
    let A=0,M=0,P=0,off=0;
    for(let i=0;i<d.days.length;i++){
      const s=sc[i]||'';
      const dt=getDayType(d.daysOfWeek[i]);
      const isSelf=self&&name===self;
      if(s==='A')A++; else if(s==='M')M++; else if(s==='P')P++;
      if(isOff(s)&&s)off++;
      const cls=s.replace('/','\/').replace(' ','')||'empty';
      const hasSwap=(sched.swapRequests||[]).some(r=>r.staffId===name&&r.dayIdx===i&&r.status==='pending');
      const swapCls=hasSwap?' swap-req':'';
      html+=`<td class="${dt==='weekend'?'wknd-col':''}">
        <div class="cell ${cls}${isSelf&&!isOff(s)&&s?' self':''}${swapCls}" title="${hasSwap?'⚠ 此格有調班申請，等待確認':''}">${s||'—'}</div>
      </td>`;
    }
    html+=`<td style="font-size:11px;color:var(--A);font-weight:600">${A}</td>
      <td style="font-size:11px;color:var(--M);font-weight:600">${M}</td>
      <td style="font-size:11px;color:var(--P);font-weight:600">${P}</td>
      <td style="font-size:11px;color:var(--RL);font-weight:600">${off}</td></tr>`;
  }

  // Daily staffing counts
  for(const type of ['A','M','P']){
    html+=`<tr class="stat-row"><td class="name" style="font-size:11px;padding:0 8px;color:${type==='A'?'var(--A)':type==='M'?'var(--M)':'var(--P)'}">${type==='A'?'早':type==='M'?'中':'晚'}班人數</td>`;
    for(let i=0;i<d.days.length;i++){
      const dow=d.daysOfWeek[i]; const dt=getDayType(dow);
      const cnt=d.staff.filter(n=>(d.schedules[n]||[])[i]===type).length;
      const need=req[dt][type];
      html+=`<td class="${dt==='weekend'?'wknd-col':''}${need>0&&cnt<need?' warn':''}">${cnt}</td>`;
    }
    html+='<td colspan="4"></td></tr>';
  }
  html+='</tbody>';
  document.getElementById('tbl').innerHTML=html;
}

init();
</script>
</body>
</html>
