<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloria 班表</title>
<style>
:root{
  --A:#388E3C;--A-bg:#E8F5E9;--M:#F57C00;--M-bg:#FFF3E0;
  --P:#1976D2;--P-bg:#E3F2FD;--RL:#757575;--RL-bg:#F5F5F5;
  --AL:#7B1FA2;--AL-bg:#F3E5F5;--SL:#D32F2F;--SL-bg:#FFEBEE;
  --OL:#455A64;--OL-bg:#ECEFF1;--SP:#C2185B;--SP-bg:#FCE4EC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#F0F2F5;min-height:100vh}
header{background:#1a1a2e;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.3)}
header h1{font-size:18px;font-weight:600}
header .sub{font-size:12px;opacity:.6;margin-top:2px}
.month-bar{background:#fff;border-bottom:1px solid #E0E0E0;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.month-bar button{background:none;border:1px solid #CCC;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.month-bar button:hover{background:#F5F5F5}
.month-label{font-size:17px;font-weight:700;min-width:110px;text-align:center}
.name-bar{background:#fff;border-bottom:1px solid #EEE;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.name-bar label{font-size:13px;color:#555;font-weight:500}
.name-bar select{border:1px solid #DDD;padding:5px 10px;border-radius:7px;font-size:14px;font-weight:600;color:#1a1a2e}
.name-bar .hint{font-size:11px;color:#AAA}
main{padding:16px 20px}

/* ── Personal View ── */
.pv-header{background:#1a1a2e;color:#fff;border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.pv-name{font-size:18px;font-weight:700}
.pv-stats{display:flex;gap:14px;font-size:12px;opacity:.8;margin-top:4px}
.pv-stat span{font-weight:700;font-size:14px}
.day-card{background:#fff;border-radius:9px;margin-bottom:8px;overflow:hidden;display:flex;align-items:stretch;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.day-card.off{opacity:.65}
.day-card.wknd .dc-date{background:#FFF3E0}
.dc-date{width:64px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;background:#FAFAFA;border-right:1px solid #F0F0F0}
.dc-day{font-size:20px;font-weight:800;color:#1a1a2e;line-height:1}
.dc-dow{font-size:11px;color:#888;margin-top:3px}
.dc-shift{width:68px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.dc-shift.A{background:var(--A-bg);color:var(--A)}
.dc-shift.M{background:var(--M-bg);color:var(--M)}
.dc-shift.P{background:var(--P-bg);color:var(--P)}
.dc-shift.RL,.dc-shift.AL,.dc-shift.SL,.dc-shift.OL,.dc-shift.生理假{background:var(--RL-bg);color:var(--RL)}
.dc-shift.empty{background:#F9F9F9;color:#CCC;font-size:12px}
.dc-co{flex:1;padding:8px 12px;display:flex;flex-direction:column;justify-content:center}
.dc-co-title{font-size:10px;color:#AAA;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.co-list{display:flex;flex-wrap:wrap;gap:5px}
.co-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:600}
.co-tag.A{background:var(--A-bg);color:var(--A)}
.co-tag.M{background:var(--M-bg);color:var(--M)}
.co-tag.P{background:var(--P-bg);color:var(--P)}
.co-off{color:#CCC;font-size:12px;font-style:italic}
.swap-badge{background:#FF6F00;color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:4px}

/* ── Full table (no name selected) ── */
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:8px 20px;background:#fff;border-bottom:1px solid #EEE}
.litem{display:flex;align-items:center;gap:4px;font-size:12px;color:#555}
.ldot{width:11px;height:11px;border-radius:3px}
.wrap{overflow-x:auto}
table.ft{border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);min-width:860px;width:100%}
table.ft th{background:#1a1a2e;color:#fff;padding:8px 2px;font-size:11px;font-weight:500;text-align:center;position:sticky;top:0;z-index:2}
table.ft th.name{min-width:76px;position:sticky;left:0;z-index:3}
table.ft td{border:1px solid #EBEBEB;padding:0;text-align:center}
table.ft td.name{font-weight:600;font-size:13px;padding:0 8px;background:#FAFAFA;position:sticky;left:0;z-index:1;min-width:76px;border-right:2px solid #DDD;white-space:nowrap}
.dh-date{font-size:13px;font-weight:700}.dh-dow{font-size:10px;opacity:.7}
th.wknd{background:#2a2a50}th.fri{background:#1e3a5e}
.cell{height:34px;width:34px;min-width:34px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;margin:auto}
.cell.A{background:var(--A-bg);color:var(--A)}.cell.M{background:var(--M-bg);color:var(--M)}
.cell.P{background:var(--P-bg);color:var(--P)}.cell.RL,.cell.RL-{background:var(--RL-bg);color:var(--RL)}
.cell.AL{background:var(--AL-bg);color:var(--AL)}.cell.SL{background:var(--SL-bg);color:var(--SL)}
.cell.OL{background:var(--OL-bg);color:var(--OL)}.cell.生理假{background:var(--SP-bg);color:var(--SP)}
.cell.empty{color:#CCC;font-size:11px}
.cell.swap-req{outline:2px dashed #FF6F00;outline-offset:-2px;border-radius:3px;position:relative}
.cell.swap-req::before{content:'申';position:absolute;top:1px;left:1px;font-size:7px;background:#FF6F00;color:#fff;border-radius:2px;padding:0 2px;font-weight:700}
td.wknd-col{background:#FFFDE7}
.stat-row td{font-size:11px;height:20px;background:#F9F9F9}
.stat-row td.warn{color:#D32F2F;font-weight:700}
.empty-msg{text-align:center;padding:40px;color:#999;font-size:14px}

.no-sel{text-align:center;padding:48px 20px;color:#999}
.no-sel .big{font-size:40px;margin-bottom:10px}
.no-sel p{font-size:14px}
</style>
</head>
<body>
<header>
  <div>
    <div class="sub">Gloria Store</div>
    <h1>📅 班表</h1>
  </div>
  <div id="loadStatus" style="font-size:12px;color:rgba(255,255,255,.6)"></div>
</header>

<div class="name-bar">
  <label>我是：</label>
  <select id="selfSelect" onchange="onSelfChange()">
    <option value="">— 選擇姓名 —</option>
  </select>
  <span class="hint">選擇後顯示個人班表及配班</span>
</div>

<div class="month-bar">
  <button onclick="prevMonth()">&#8249;</button>
  <span class="month-label" id="monthLabel">—</span>
  <button onclick="nextMonth()">&#8250;</button>
</div>

<!-- Legend only shown in full-table mode -->
<div class="legend" id="legend">
  <div class="litem"><div class="ldot" style="background:var(--A)"></div>早班 A</div>
  <div class="litem"><div class="ldot" style="background:var(--M)"></div>中班 M</div>
  <div class="litem"><div class="ldot" style="background:var(--P)"></div>晚班 P</div>
  <div class="litem"><div class="ldot" style="background:var(--RL)"></div>例假 RL</div>
  <div class="litem"><div class="ldot" style="background:var(--AL)"></div>年假 AL</div>
  <div class="litem"><div class="ldot" style="background:var(--SL)"></div>病假 SL</div>
  <div class="litem"><div class="ldot" style="background:var(--OL)"></div>公假 OL</div>
  <div class="litem"><div class="ldot" style="background:var(--SP)"></div>生理假</div>
</div>

<main id="main"></main>

<script>
const DOW_ZH={Mon:'一',Tue:'二',Wed:'三',Thu:'四',Fri:'五',Sat:'六',Sun:'日'};
const OFF=new Set(['RL','RL/','RL-','AL','SL','ML','BL','OL','PL','FL','WL','生理假']);
function isOff(x){return !x||OFF.has(x)||x.startsWith('RL')}
function getDayType(dow){return dow==='Sat'||dow==='Sun'?'weekend':dow==='Fri'?'friday':'weekday'}

let months=[],monthIdx=0,sched=null,staffData=null;

async function init(){
  try{
    staffData=await fetch('data/staff.json').then(r=>r.json());
    const sel=document.getElementById('selfSelect');
    const saved=localStorage.getItem('gloria_self')||'';
    for(const s of staffData.staff){
      const o=document.createElement('option');
      o.value=s.id; o.textContent=s.name;
      if(s.id===saved) o.selected=true;
      sel.appendChild(o);
    }
    try{
      const idx=await fetch('data/months.json').then(r=>r.json());
      months=idx.months;
    } catch(e){ months=['2026-04']; }
    monthIdx=months.length-1;
    await loadMonth();
  } catch(e){
    document.getElementById('main').innerHTML='<div class="empty-msg">班表載入失敗</div>';
  }
}

async function loadMonth(){
  const m=months[monthIdx];
  document.getElementById('monthLabel').textContent=m;
  document.getElementById('loadStatus').textContent='載入中…';
  try{
    sched=await fetch(`data/schedule_${m.replace('-','_')}.json?t=${Date.now()}`).then(r=>r.json());
    document.getElementById('loadStatus').textContent='';
    render();
  } catch(e){
    sched=null;
    document.getElementById('loadStatus').textContent='⚠ 尚無資料';
    document.getElementById('main').innerHTML='<div class="empty-msg">本月尚無班表</div>';
  }
}

function prevMonth(){if(monthIdx>0){monthIdx--;loadMonth();}}
function nextMonth(){if(monthIdx<months.length-1){monthIdx++;loadMonth();}}
function onSelfChange(){
  const v=document.getElementById('selfSelect').value;
  localStorage.setItem('gloria_self',v);
  render();
}

function render(){
  if(!sched) return;
  const self=document.getElementById('selfSelect').value;
  if(self && sched.schedules && sched.schedules[self]!==undefined){
    renderPersonal(self);
  } else {
    renderFull();
  }
}

// ── Personal view ──
function renderPersonal(selfId){
  document.getElementById('legend').style.display='none';
  const d=sched;
  const myShifts=d.schedules[selfId]||[];
  const A=myShifts.filter(x=>x==='A').length;
  const M=myShifts.filter(x=>x==='M').length;
  const P=myShifts.filter(x=>x==='P').length;
  const off=myShifts.filter(x=>isOff(x)&&x).length;
  const selfName=(staffData?.staff.find(s=>s.id===selfId)||{name:selfId}).name;

  let html=`<div class="pv-header">
    <div>
      <div class="pv-name">👤 ${selfName}</div>
      <div class="pv-stats">
        <div>早班 <span style="color:#81C784">${A}</span></div>
        <div>中班 <span style="color:#FFB74D">${M}</span></div>
        <div>晚班 <span style="color:#64B5F6">${P}</span></div>
        <div>休假 <span style="color:#BDBDBD">${off}</span></div>
      </div>
    </div>
    <div style="font-size:12px;opacity:.6">${d.month}</div>
  </div>`;

  for(let i=0;i<d.days.length;i++){
    const dow=d.daysOfWeek[i];
    const isWknd=dow==='Sat'||dow==='Sun';
    const myShift=myShifts[i]||'';
    const myOff=isOff(myShift);
    const shiftCls=myShift||'empty';
    const hasSwap=(d.swapRequests||[]).some(r=>r.staffId===selfId&&r.dayIdx===i&&r.status==='pending');

    let coHtml='';
    if(!myOff&&myShift){
      const coworkers=(d.staff||[])
        .filter(n=>n!==selfId)
        .map(n=>({name:n,shift:(d.schedules[n]||[])[i]||''}))
        .filter(x=>!isOff(x.shift)&&x.shift);
      if(coworkers.length){
        coHtml=`<div class="dc-co-title">配班同事</div><div class="co-list">`
          +coworkers.map(x=>`<span class="co-tag ${x.shift}">${x.name} <b>${x.shift}</b></span>`).join('')
          +'</div>';
      } else {
        coHtml='<div class="co-off">無其他配班</div>';
      }
    } else {
      coHtml='<div class="co-off">休假日</div>';
    }

    html+=`<div class="day-card${myOff?' off':''}${isWknd?' wknd':''}">
      <div class="dc-date">
        <div class="dc-day">${d.days[i]}</div>
        <div class="dc-dow">${DOW_ZH[dow]}</div>
      </div>
      <div class="dc-shift ${shiftCls}">${myShift||(myOff?'休':'—')}${hasSwap?'<span class="swap-badge">申</span>':''}</div>
      <div class="dc-co">${coHtml}</div>
    </div>`;
  }

  document.getElementById('main').innerHTML=html;
}

// ── Full table (fallback when no name selected) ──
function renderFull(){
  document.getElementById('legend').style.display='flex';
  if(!sched){ document.getElementById('main').innerHTML='<div class="empty-msg">本月尚無班表</div>'; return; }
  const d=sched;
  const req=(staffData?.rules?.staffingRequirements)||{weekday:{A:1,M:0,P:3},friday:{A:1,M:1,P:3},weekend:{A:1,M:1,P:3}};
  let html='<div class="wrap"><table class="ft"><thead><tr><th class="name">姓名</th>';
  for(let i=0;i<d.days.length;i++){
    const dow=d.daysOfWeek[i]; const dt=getDayType(dow);
    html+=`<th class="${dt==='weekend'?'wknd':dt==='friday'?'fri':''}"><div class="dh-date">${d.days[i]}</div><div class="dh-dow">${DOW_ZH[dow]||dow}</div></th>`;
  }
  html+='<th>早</th><th>中</th><th>晚</th><th>休</th></thead><tbody>';
  for(const name of d.staff){
    const sc=d.schedules[name]||[];
    html+=`<tr><td class="name">${name}</td>`;
    let A=0,M=0,P=0,off=0;
    for(let i=0;i<d.days.length;i++){
      const s=sc[i]||''; const dt=getDayType(d.daysOfWeek[i]);
      if(s==='A')A++;else if(s==='M')M++;else if(s==='P')P++;
      if(isOff(s)&&s)off++;
      const cls=s||'empty';
      const hasSwap=(d.swapRequests||[]).some(r=>r.staffId===name&&r.dayIdx===i&&r.status==='pending');
      html+=`<td class="${dt==='weekend'?'wknd-col':''}"><div class="cell ${cls}${hasSwap?' swap-req':''}">${s||'—'}</div></td>`;
    }
    html+=`<td style="font-size:11px;color:var(--A);font-weight:600">${A}</td><td style="font-size:11px;color:var(--M);font-weight:600">${M}</td><td style="font-size:11px;color:var(--P);font-weight:600">${P}</td><td style="font-size:11px;color:var(--RL);font-weight:600">${off}</td></tr>`;
  }
  for(const type of ['A','M','P']){
    html+=`<tr class="stat-row"><td class="name" style="font-size:11px;padding:0 8px;color:${type==='A'?'var(--A)':type==='M'?'var(--M)':'var(--P)'}">${type==='A'?'早':type==='M'?'中':'晚'}班人數</td>`;
    for(let i=0;i<d.days.length;i++){
      const dt=getDayType(d.daysOfWeek[i]);
      const cnt=d.staff.filter(n=>(d.schedules[n]||[])[i]===type).length;
      const need=(req[dt]||{})[type]||0;
      html+=`<td class="${dt==='weekend'?'wknd-col':''}${need>0&&cnt<need?' warn':''}">${cnt}</td>`;
    }
    html+='<td colspan="4"></td></tr>';
  }
  html+='</tbody></table></div>';
  document.getElementById('main').innerHTML=html;
}

init();
</script>
</body>
</html>
